<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequences — Mental Edge</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── SEQUENCES DASHBOARD ── */
.seq-dash-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.seq-dash-logo { font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: var(--text); }
.seq-dash-logo span { color: var(--accent); font-style: italic; }

/* ── PRACTICE GAME STYLES ── */
.seq-wrap {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.seq-question-label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  text-align: center;
}
.seq-terms {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 28px;
  padding: 22px 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.seq-term {
  font-family: 'Instrument Serif', serif;
  font-size: 1.55rem;
  color: var(--text);
  white-space: nowrap;
}
.seq-comma {
  font-family: 'Instrument Serif', serif;
  font-size: 1.55rem;
  color: var(--muted);
  margin-right: 2px;
}
.seq-blank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 64px;
  height: 46px;
  border-radius: 8px;
  border: 2px dashed var(--border2);
  background: var(--surface);
  font-family: 'Instrument Serif', serif;
  font-size: 1.55rem;
  color: var(--muted);
  padding: 0 10px;
  transition: border-color .2s, background .2s, color .2s;
}
.seq-blank.filled-correct {
  border-style: solid;
  border-color: var(--green);
  background: var(--green-light);
  color: var(--green);
}
.seq-blank.filled-wrong {
  border-style: solid;
  border-color: var(--red);
  background: var(--red-light);
  color: var(--red);
}
.seq-ellipsis {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  color: var(--muted);
  letter-spacing: 2px;
}
.seq-choices {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 0;
}
@media (max-width: 600px) {
  .seq-choices { grid-template-columns: repeat(3, 1fr); }
}
.seq-choice {
  font-family: 'DM Mono', monospace;
  font-size: .92rem;
  text-align: center;
  padding: 13px 8px;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color .12s, background .12s, transform .1s;
  color: var(--text);
  white-space: nowrap;
}
.seq-choice:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateY(-1px);
}
.seq-choice.correct {
  border-color: var(--green) !important;
  background: var(--green-light) !important;
  color: var(--green);
  font-weight: 700;
}
.seq-choice.wrong {
  border-color: var(--red) !important;
  background: var(--red-light) !important;
  color: var(--red);
}
.seq-choice.selected {
  border-color: var(--border2) !important;
  background: var(--surface2) !important;
  color: var(--text) !important;
  font-weight: 700;
}
.seq-choice.reveal-correct {
  border-color: var(--green) !important;
  background: var(--green-light) !important;
  color: var(--green);
  font-weight: 700;
}
.seq-choice:disabled { cursor: default; }

.seq-explanation {
  margin-top: 18px;
  padding: 14px 18px;
  background: linear-gradient(135deg, #f0f4ff 0%, #f8f6ff 100%);
  border: 1px solid #d0d8f8;
  border-radius: 10px;
  font-size: .84rem;
  color: var(--text2);
  line-height: 1.6;
  animation: fadeSlideIn .3s ease forwards;
}
.seq-explanation strong {
  color: var(--accent);
  font-weight: 600;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.seq-next-btn {
  margin-top: 14px;
  width: 100%;
  padding: 13px;
  background: var(--text);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: .88rem;
  cursor: pointer;
  transition: background .15s;
  animation: fadeSlideIn .3s ease .1s both;
}
.seq-next-btn:hover { background: #111; }
.seq-type-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.seq-type-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px 4px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: border-color .15s, color .15s, background .15s;
  user-select: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.seq-type-toggle-btn:hover {
  border-color: var(--border2);
  color: var(--text2);
}
.seq-type-toggle-btn.revealed {
  color: var(--accent);
  border-color: #c3cff7;
  background: var(--accent-light);
}
.seq-toggle-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border2);
  transition: background .15s;
  flex-shrink: 0;
}
.seq-type-toggle-btn.revealed .seq-toggle-dot {
  background: var(--accent);
}
.seq-type-label {
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0;
  max-width: 0;
  overflow: hidden;
  white-space: nowrap;
  transition: opacity .2s, max-width .3s ease;
}
.seq-type-label.visible {
  opacity: 1;
  max-width: 300px;
}

/* ── TEST MODE ── */
.test-nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 18px;
}
.test-q-counter {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
}
.test-timer {
  font-family: 'DM Mono', monospace;
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
  min-width: 54px;
  text-align: right;
  transition: color .2s;
}
.test-timer.warn { color: var(--red); }
.test-nav-arrows {
  display: flex;
  gap: 6px;
}
.test-arrow {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
}
.test-arrow:hover { background: var(--surface2); border-color: var(--border2); }
.test-arrow:disabled { opacity: .3; cursor: default; }

.test-skip-btn {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .84rem;
  color: var(--text2);
  cursor: pointer;
  margin-top: 10px;
  transition: background .12s, border-color .12s, color .12s;
}
.test-skip-btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--text); }

.test-q-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 14px;
  justify-content: center;
}
.test-q-dot {
  width: 32px; height: 32px;
  border-radius: 7px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s, color .12s;
}
.test-q-dot:hover { border-color: var(--border2); background: var(--surface2); }
.test-q-dot.answered { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.test-q-dot.skipped { border-style: dashed; color: var(--muted); }
.test-q-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.test-q-dot.dot-correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
.test-q-dot.dot-wrong { background: var(--red-light); border-color: var(--red); color: var(--red); }

.test-submit-row {
  margin-top: 16px;
  display: flex;
  justify-content: center;
}
.test-submit-btn {
  padding: 12px 36px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: .9rem;
  cursor: pointer;
  transition: background .15s;
}
.test-submit-btn:hover { background: #111; }

/* Review screen */
.test-review-header {
  text-align: center;
  margin-bottom: 20px;
}
.test-score-big {
  font-family: 'Instrument Serif', serif;
  font-size: 3.5rem;
  line-height: 1;
  color: var(--text);
  margin-bottom: 4px;
}
.test-score-sub {
  font-size: .78rem;
  color: var(--text2);
  margin-bottom: 14px;
}
.test-score-pills {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.test-score-pill {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
}
.test-score-pill.green { background: var(--green-light); border-color: var(--green); color: var(--green); }
.test-score-pill.red { background: var(--red-light); border-color: var(--red); color: var(--red); }
.test-score-pill.best { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

.test-review-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 14px 0 10px;
  gap: 8px;
}
.test-review-q-label {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
  text-align: center;
  flex: 1;
}
</style>

<body>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <header class="seq-dash-header">
    <div style="display:flex;align-items:center;gap:16px">
      <a class="back-btn" href="index.html" style="border-color:transparent">&#8592; Home</a>
      <div class="seq-dash-logo">Sequences</div>
    </div>
    <div class="dash-sub">Assessment Suite</div>
  </header>
  <div class="dash-body">
    <div class="dash-intro">
      <h2>Select an exercise</h2>
      <p>Pattern recognition and sequence extrapolation. Each exercise tests your ability to identify mathematical rules — arithmetic, geometric, prime-based, fractional, and more.</p>
    </div>
    <div class="games-grid" id="seq-games-grid"></div>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="game-screen" style="display:none">
  <header class="game-header">
    <button class="back-btn" onclick="showDashboard()">&#8592; Sequences</button>
    <div class="game-name-bar" id="gs-name"></div>
    <div class="stat-strip" id="gs-stats"></div>
  </header>
  <div class="game-wrap">
    <div class="game-panel" id="game-panel"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  SEQUENCES — GAME REGISTRY
// ══════════════════════════════════════════════════════
const SEQ_GAMES = [
  {
    id: 'seq-practice',
    title: 'Practice',
    icon: '∿',
    tag: 'Sequences',
    desc: 'Complete the sequence by identifying the pattern. Covers 50+ sequence types across 9 categories — arithmetic, geometric, prime-based, recursive, fractional, decimal, digit-based, interleaved, and more.',
    meta: ['50+ types', 'Unlimited'],
    start: startSeqPractice
  },
  {
    id: 'seq-test',
    title: 'Test',
    icon: '▶',
    tag: 'Sequences',
    desc: '26 questions, 25 minutes. Navigate freely, skip and return to questions. Score = correct − incorrect (skips are free). Answers and explanations revealed after submission.',
    meta: ['26 Qs', '25 min', 'Scored'],
    start: startSeqTest
  }
];

// ── score storage ──
let seqScores = {};
try {
  const raw = JSON.parse(localStorage.getItem('me_seq_scores') || '{}');
  Object.keys(raw).forEach(k => {
    const v = raw[k];
    if (v != null && typeof v === 'object' && typeof v.label === 'string') seqScores[k] = v;
  });
} catch(e) {}

function saveSeqScore(id, v, label) {
  const entry = {v, label: label || String(v)};
  const cur = seqScores[id];
  const curV = cur != null ? cur.v : null;
  if (curV == null || v > curV) {
    seqScores[id] = entry;
    try { localStorage.setItem('me_seq_scores', JSON.stringify(seqScores)); } catch(e) {}
  }
}
function getSeqScoreLabel(id) {
  const s = seqScores[id];
  return (s && s.label) ? s.label : null;
}

// ── gen guard ──
let _gen = 0;
function myGen() { return _gen; }

// ── navigation ──
function showDashboard() {
  _gen++;
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('game-screen').style.display = 'none';
  renderDashboard();
}
function launchGame(id) {
  _gen++;
  const g = SEQ_GAMES.find(x => x.id === id);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('gs-name').textContent = g.title;
  document.getElementById('gs-stats').innerHTML = '';
  const p = document.getElementById('game-panel');
  p.innerHTML = ''; p.className = 'game-panel';
  g.start();
}
function renderDashboard() {
  document.getElementById('seq-games-grid').innerHTML = SEQ_GAMES.map(g => `
    <div class="game-card" onclick="launchGame('${g.id}')">
      <div class="card-tag">${g.tag}</div>
      <div class="card-icon-row">${g.icon}</div>
      <div class="card-title">${g.title}</div>
      <div class="card-desc">${g.desc}</div>
      <div class="card-meta">
        ${g.meta.map(m => `<span class="chip">${m}</span>`).join('')}
        ${getSeqScoreLabel(g.id) != null ? `<span class="chip hi">Best: ${getSeqScoreLabel(g.id)}</span>` : ''}
      </div>
      <button class="play-btn">Start exercise →</button>
    </div>`).join('');
}

function setStats(html) { document.getElementById('gs-stats').innerHTML = html; }
function setPanel(html, top) {
  const p = document.getElementById('game-panel');
  p.className = 'game-panel' + (top ? ' top' : '');
  p.innerHTML = html;
}
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

// ══════════════════════════════════════════════════════
//  SEQUENCE GENERATORS
//  Each returns: { terms[], answer, explanation, typeName }
//  terms = terms SHOWN (not the blank); answer = the next value
// ══════════════════════════════════════════════════════

// ── helpers ──
function isPrime(n) {
  if (n < 2) return false;
  for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false;
  return true;
}
function getPrimes(count, start = 2) {
  const primes = [];
  let n = start;
  while (primes.length < count) { if (isPrime(n)) primes.push(n); n++; }
  return primes;
}
function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
function fmtFrac(n, d) {
  const g = gcd(Math.abs(n), Math.abs(d));
  return `${n/g}/${d/g}`;
}
function fmtDec(x, dp = 5) {
  // Round to dp sig figs and strip trailing zeros
  const s = parseFloat(x.toPrecision(dp));
  return String(s);
}

// ════════════════════════════════════════════════════
//  CATEGORY A — ARITHMETIC & POLYNOMIAL
// ════════════════════════════════════════════════════

// A1: Arithmetic (constant difference)
function genArithmetic() {
  const d = rand(-12, 12); if (d === 0) return genArithmetic();
  const start = rand(-10, 30);
  const count = rand(5, 7);
  const terms = Array.from({length: count}, (_, i) => start + i * d);
  const sign = d > 0 ? `+${d}` : `${d}`;
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Arithmetic',
    explanation: `Each term changes by a constant difference of <strong>${sign}</strong>.`
  };
}

// A2: Quadratic / constant 2nd differences
// (covers: quadratic formula, triangle numbers n(n+1)/2, oblong n(n+1),
//  pentagonal n(3n-1)/2, hexagonal n(2n-1), squares+linear, etc.)
function genConstantSecondDiff() {
  // Pick a random figurate family or pure quadratic
  const kind = rand(0, 6);
  let terms, explanation, typeName;
  const offset = rand(0, 3);
  const count = rand(5, 7);
  if (kind === 0) {
    // Triangle: n(n+1)/2
    terms = Array.from({length: count}, (_, i) => { const n = i+1+offset; return n*(n+1)/2; });
    typeName = 'Triangle Numbers';
    explanation = `Triangle numbers: <strong>T(n) = n(n+1)/2</strong>. Second differences are constant (1).`;
  } else if (kind === 1) {
    // Oblong / pronic: n(n+1)
    terms = Array.from({length: count}, (_, i) => { const n = i+1+offset; return n*(n+1); });
    typeName = 'Oblong Numbers';
    explanation = `Oblong numbers: <strong>n(n+1)</strong>. Second differences are constant (2).`;
  } else if (kind === 2) {
    // Pentagonal: n(3n-1)/2
    terms = Array.from({length: count}, (_, i) => { const n = i+1+offset; return n*(3*n-1)/2; });
    typeName = 'Pentagonal Numbers';
    explanation = `Pentagonal numbers: <strong>P(n) = n(3n−1)/2</strong>. Second differences are constant (3).`;
  } else if (kind === 3) {
    // Perfect squares (offset)
    const startN = rand(1, 5);
    terms = Array.from({length: count}, (_, i) => (startN+i)*(startN+i));
    typeName = 'Perfect Squares';
    explanation = `Consecutive perfect squares: <strong>${startN}², ${startN+1}², ${startN+2}²…</strong>`;
  } else {
    // General quadratic an²+bn+c (includes all the above as special cases)
    const a = rand(1, 3), b = rand(-3, 5), c = rand(0, 10);
    const n0 = rand(1, 4);
    terms = Array.from({length: count}, (_, i) => a*(n0+i)*(n0+i) + b*(n0+i) + c);
    typeName = 'Constant 2nd Differences';
    const bStr = b === 0 ? '' : (b > 0 ? ` + ${b}n` : ` − ${Math.abs(b)}n`);
    const cStr = c === 0 ? '' : ` + ${c}`;
    explanation = `Quadratic rule: <strong>${a}n²${bStr}${cStr}</strong>. The second differences are constant (${2*a}).`;
  }
  return { terms: terms.slice(0,-1), answer: terms[terms.length-1], typeName, explanation };
}

// A3: Linearly accelerating differences (+step each time to the diff)
function genAcceleratingDiff() {
  const d0 = rand(1, 8), step = rand(2, 6);
  const start = rand(2, 15);
  const count = rand(5, 7);
  const terms = [start];
  let diff = d0;
  for (let i = 1; i < count; i++) { terms.push(terms[terms.length-1] + diff); diff += step; }
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Accelerating Differences',
    explanation: `Differences increase by <strong>${step}</strong> each step: +${d0}, +${d0+step}, +${d0+2*step}…`
  };
}

// A4: Differences themselves are geometric (×r)
function genGeomDiff() {
  const r = rand(2, 3);
  const d0 = rand(1, 4);
  const sign = Math.random() < 0.3 ? -1 : 1; // occasionally start with negative diff
  const start = rand(3, 20);
  const count = rand(5, 7);
  const terms = [start];
  let diff = sign * d0;
  for (let i = 1; i < count; i++) { terms.push(terms[terms.length-1] + diff); diff *= r; }
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Geometric Differences',
    explanation: `Differences multiply by <strong>${r}</strong> each step: ${sign*d0}, ${sign*d0*r}, ${sign*d0*r*r}…`
  };
}

// A5: Differences alternate sign and double (screenshot example: -1,+2,-4,+8,-16,+32)
function genAltSignGeomDiff() {
  const d0 = rand(1, 3);
  const r = rand(2, 2); // always ×2 for clarity
  const start = rand(30, 80);
  const count = rand(6, 8);
  const terms = [start];
  let diff = -d0;
  for (let i = 1; i < count; i++) {
    terms.push(terms[terms.length-1] + diff);
    diff = diff * -r;
  }
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Alternating-Sign Doubling Differences',
    explanation: `Differences alternate sign and double each step: <strong>${-d0}, ${d0*r}, ${-d0*r*r}, ${d0*r*r*r}…</strong>`
  };
}

// A6: Differences are Fibonacci numbers
function genFibDiffs() {
  const fibs = [1,1,2,3,5,8,13,21];
  const start = rand(2, 20);
  const count = rand(5, 7);
  const terms = [start];
  for (let i = 0; i < count - 1; i++) terms.push(terms[terms.length-1] + fibs[i]);
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Fibonacci Differences',
    explanation: `The differences between terms are consecutive Fibonacci numbers: <strong>+1, +1, +2, +3, +5, +8…</strong>`
  };
}

// A7: Cyclic differences (fixed repeating pattern)
function genCyclicDiff() {
  // 3-step or 4-step cycle, can include negatives (screenshot: -10,+1,+7,+1 repeating)
  const useMixed = Math.random() < 0.5;
  let cycle;
  if (useMixed) {
    const big = -rand(5,12);
    const a = rand(1,4), b = rand(3,8), c = rand(1,4);
    cycle = [big, a, b, c];
  } else {
    const vals = [rand(2,6), rand(4,10), rand(3,8)];
    cycle = vals;
  }
  const start = rand(5, 40);
  const count = rand(7, 10); // more terms to make cycle visible
  const terms = [start];
  for (let i = 1; i < count; i++) terms.push(terms[terms.length-1] + cycle[(i-1) % cycle.length]);
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Cyclic Differences',
    explanation: `Differences repeat in a cycle: <strong>${cycle.map(v=>v>=0?'+'+v:v).join(', ')}, ${cycle.map(v=>v>=0?'+'+v:v).join(', ')}…</strong>`
  };
}

// A8: Converging halving differences (alternating sign, ÷2 each step — screenshot example)
function genConvergingDiff() {
  const d0 = rand(8, 20) * (Math.random()<0.5?1:-1);
  const start = rand(80, 120);
  const count = rand(6, 7);
  const terms = [start];
  let diff = d0;
  for (let i = 1; i < count; i++) {
    terms.push(terms[terms.length-1] + diff);
    diff = -(diff / 2);
  }
  // Only accept if all values are nice (halve cleanly)
  const nice = terms.every(t => Number.isInteger(t) || (t*2 === Math.round(t*2)));
  if (!nice) return genArithmetic();
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Converging Halving Differences',
    explanation: `Differences halve and alternate sign each step: <strong>${d0}, ${-d0/2}, ${d0/4}…</strong> The sequence converges.`
  };
}

// B1: Geometric (×r)
function genGeometric() {
  const r = rand(2, 5);
  const start = rand(1, 8);
  const count = rand(5, 6);
  const terms = Array.from({length: count}, (_, i) => start * Math.pow(r, i));
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Geometric',
    explanation: `Each term is multiplied by <strong>${r}</strong>.`
  };
}

// B2: Geometric with additive constant (aₙ = r·aₙ₋₁ + c)
function genLinearRecurrence() {
  const r = rand(2, 3), c = rand(1, 10), a0 = rand(1, 8);
  const count = rand(5, 6);
  const terms = [a0];
  for (let i = 1; i < count; i++) terms.push(r * terms[terms.length-1] + c);
  return {

}

// B3: Alternating ×r and +b (screenshot: ×10 and +9)
function genAltMultAdd() {
  const r = [2,3,4,5,10][rand(0,4)];
  const b = rand(2, 12);
  const start = rand(2, 10);
  const count = rand(6, 7);
  const terms = [start];
  for (let i = 1; i < count; i++) {

  return {

}

// B4: Alternating ×r and −c
function genAltMultSub() {
  const r = rand(2,3), c = rand(5,15), start = rand(3,12);
  const count = rand(5,7);
  const terms = [start];
  for (let i = 1; i < count; i++) {
    terms.push(i%2===1 ? terms[terms.length-1]*r : terms[terms.length-1]-c);
  }

    terms: terms.slice(0,-1), answer: terms[terms.length-1],

  };
}

// B5: Alternating +a and −b (net change per pair)
function genAlternatingAddSub() {
  const a = rand(3, 12), b = rand(2, 8);
  if (a === b) return genAlternatingAddSub();
  const start = rand(5, 30);
  const count = rand(7, 9);
  const terms = [start];
  for (let i = 1; i < count; i++) terms.push(terms[terms.length-1] + (i % 2 === 1 ? a : -b));

// B6: Perfect powers (n^k)
function genPowers() {
  const exp = rand(2, 4);
  const startN = rand(1, 5);
  const count = rand(5, 7);
  const terms = Array.from({length: count}, (_, i) => Math.pow(startN + i, exp));
  const sup = exp===2?'²':exp===3?'³':'⁴';
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: `Perfect ${exp===2?'Squares':exp===3?'Cubes':'Powers'}`,
    explanation: `Consecutive perfect ${exp===2?'squares':exp===3?'cubes':'4th powers'}: <strong>${startN}${sup}, ${startN+1}${sup}, ${startN+2}${sup}…</strong>`
  };
}

// B7: Factorials
function genFactorials() {
  const offset = rand(1, 3);
  const count = rand(5, 6);
  let f = 1;
  const terms = [];
  for (let i = 1; i <= count + offset - 1; i++) {
    f *= i;
    if (i >= offset) terms.push(f);
  }
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Factorials',
    explanation: `Consecutive factorials: <strong>${offset}!, ${offset+1}!, ${offset+2}!…</strong>`
  };
}

// D1: Fibonacci-type (each = sum of two preceding)
function genFibonacciType() {
  const a = rand(1, 8), b = rand(1, 8);
  const count = rand(6, 8);
  const terms = [a, b];
  for (let i = 2; i < count; i++) terms.push(terms[terms.length-1] + terms[terms.length-2]);
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Fibonacci-type',
    explanation: `Each term is the sum of the two preceding terms. Starts with <strong>${a}, ${b}</strong>.`
  };
}

// D2: Difference-of-two-preceding (like Fibonacci but subtraction — screenshot seq10)
function genDiffOfTwo() {
  const a = rand(-5, 10), b = rand(-5, 15);
  const count = rand(7, 10); // need many terms to show the cycle
  const terms = [a, b];
  for (let i = 2; i < count; i++) terms.push(terms[terms.length-2] - terms[terms.length-1]);
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Difference of Two Preceding',
    explanation: `Each term = the <strong>difference</strong> of the two preceding terms (second-to-last minus last).`
  };
}

// D3: Tribonacci (sum of three preceding)
function genTribonacci() {
  const a = rand(1,3), b = rand(1,3), c = rand(1,4);
  const count = rand(7, 9);
  const terms = [a, b, c];
  for (let i = 3; i < count; i++) terms.push(terms[terms.length-1] + terms[terms.length-2] + terms[terms.length-3]);
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Tribonacci-type',
    explanation: `Each term is the sum of the three preceding terms. Starts with <strong>${a}, ${b}, ${c}</strong>.`
  };
}

// D4: Rolling average of 3 preceding terms (screenshot example)
function genRollingAverage() {
  // Pick 3 random starting integers; subsequent = average of last 3
  const a = rand(1, 50) * (Math.random()<0.3 ? -1 : 1);
  const b = rand(1, 50) * (Math.random()<0.3 ? -1 : 1);
  const c = rand(1, 50) * (Math.random()<0.3 ? -1 : 1);
  const count = rand(6, 8);
  const terms = [a, b, c];
  for (let i = 3; i < count; i++) {
    const avg = (terms[terms.length-1] + terms[terms.length-2] + terms[terms.length-3]) / 3;
    if (!Number.isInteger(avg)) return genRollingAverage(); // retry if non-integer
    terms.push(avg);
  }
  if (terms.some(t => Math.abs(t) > 999)) return genRollingAverage();
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Rolling Average of 3',
    explanation: `From the 4th term onward, each term = <strong>average of the three preceding terms</strong>.`
  };
}

// D5: General two-term recurrence aₙ = p·aₙ₋₁ + q·aₙ₋₂
function genTwoTermRecurrence() {
  const p = rand(1,3), q = rand(1,2);
  const t0 = rand(1,5), t1 = rand(1,6);
  const count = rand(5,7);
  const terms = [t0, t1];
  for (let i = 2; i < count; i++) terms.push(p*terms[terms.length-1] + q*terms[terms.length-2]);
  if (terms.some(t => t > 50000)) return genFibonacciType();
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Two-term Recurrence',
    explanation: `aₙ = <strong>${p}·aₙ₋₁ + ${q}·aₙ₋₂</strong>.`
  };
}

// E1: Two interleaved arithmetic sequences
function genInterleavedArithmetic() {
  const d1 = rand(2, 8), d2 = rand(3, 10);
  const s1 = rand(2, 15), s2 = rand(3, 20);
  if (Math.abs(s1-s2) < 2) return genInterleavedArithmetic();
  const count = rand(7, 9);
  const terms = [];
  for (let i = 0; i < count; i++) {
    terms.push(i % 2 === 0 ? s1 + (i/2)*d1 : s2 + ((i-1)/2)*d2);
  }
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Two Interleaved Arithmetic',
    explanation: `Two interleaved arithmetic sequences: positions 1,3,5… go +${d1}; positions 2,4,6… go +${d2}.`
  };
}

// E2: Two interleaved geometric sequences
function genInterleavedGeometric() {
  const r1 = rand(2, 3), r2 = rand(2, 3);
  const s1 = rand(1, 4), s2 = rand(1, 5);
  if (s1 === s2 && r1 === r2) return genInterleavedGeometric();
  const count = rand(6, 8);
  const terms = [];
  for (let i = 0; i < count; i++) {
    terms.push(i % 2 === 0 ? s1 * Math.pow(r1, i/2) : s2 * Math.pow(r2, (i-1)/2));
  }
  if (terms.some(t => t > 10000)) return genInterleavedArithmetic();
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Two Interleaved Geometric',
    explanation: `Two interleaved geometric sequences: odd positions ×${r1}, even positions ×${r2}.`
  };
}

// E3: Interleaved arithmetic + geometric
function genInterleavedArithGeom() {
  const d = rand(3, 8), r = rand(2, 3);
  const s1 = rand(2, 12), s2 = rand(1, 5);
  const count = rand(6, 8);
  const terms = [];
  for (let i = 0; i < count; i++) {
    terms.push(i % 2 === 0 ? s1 + (i/2)*d : s2 * Math.pow(r, (i-1)/2));
  }
  if (terms.some(t => t > 5000)) return genInterleavedArithmetic();
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Interleaved Arithmetic & Geometric',
    explanation: `Two interleaved sequences: odd positions form arithmetic (+${d}), even positions form geometric (×${r}).`
  };
}

// F1: Add digit sum
function genDigitSum() {
  const start = rand(10, 60);
  const count = rand(5, 7);
  const terms = [start];
  for (let i = 1; i < count; i++) {
    const prev = terms[terms.length-1];
    const ds = String(Math.abs(prev)).split('').reduce((s,c)=>s+parseInt(c),0);
    terms.push(prev + ds);
  }
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Add Digit Sum',
    explanation: `Each term = previous term + <strong>sum of its digits</strong>.`
  };
}

// F2: Add digit product
function genDigitProduct() {
  const start = rand(11, 39);
  const count = rand(5, 7);
  const terms = [start];
  for (let i = 1; i < count; i++) {
    const prev = terms[terms.length-1];
    const dp = String(prev).split('').reduce((p,c)=>p*parseInt(c),1);
    if (dp === 0) { terms.push(prev + 9); continue; }
    terms.push(prev + dp);
  }
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Add Digit Product',
    explanation: `Each term = previous term + <strong>product of its digits</strong>.`
  };
}

// F3: Digit rotation (cyclic permutation of digits — screenshot sequence 4)
function genDigitRotation() {
  // Pick a 5-6 digit number and rotate its digits each step
  const digits = rand(4, 5); // 4 or 5 digit numbers
  const dArr = [];
  dArr.push(rand(1,9)); // no leading zero
  for (let i = 1; i < digits; i++) dArr.push(rand(0,9));
  const count = rand(5, 7);
  const terms = [];
  for (let i = 0; i < count; i++) {
    const rotated = [...dArr.slice(i % dArr.length), ...dArr.slice(0, i % dArr.length)];
    const num = parseInt(rotated.join(''));
    if (num === 0 || String(num).length !== digits) return genDigitRotation(); // skip leading-zero issues
    terms.push(num);
  }
  // Check all distinct enough
  if (new Set(terms).size < 3) return genDigitRotation();
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Digit Rotation',
    explanation: `Each term is formed by <strong>rotating the digits</strong> of the previous term one position to the left.`
  };
}

// G1: Both numerator and denominator arithmetic
function genFracBothArith() {
  let n = rand(1,8), d = rand(3,12), dn = rand(3,9), dd = rand(1,4);
  // Guard: if dn/dd == n/d the sequence is constant — reject
  if (dn * d === dd * n) return genFracBothArith();
  // Also reject same step size when it would cause constant ratio
  const count = rand(5, 7);
  const terms = [];
  let cn = n, cd = d;
  for (let i = 0; i < count; i++) {
    terms.push([cn, cd]);
    cn += dn; cd += dd;
  }
  // All rendered fractions must be distinct
  const strs = terms.map(([a,b]) => fmtFrac(a,b));
  if (new Set(strs).size < count) return genFracTelescoping();
  return {
    terms: strs.slice(0, -1),
    answer: strs[strs.length-1],
    typeName: 'Fraction — Both Arithmetic',
    explanation: `Numerator +${dn} each step; denominator +${dd} each step.`
  };
}

// G2: Numerator arithmetic, denominator alternates between two step sizes
function genFracAltDenom() {
  let n = rand(1,8), d = rand(3,12), dn = rand(4,10);
  const dd1 = rand(1,2), dd2 = rand(2,4);
  if (dd1 === dd2) return genFracAltDenom();
  const count = rand(5, 7);
  const terms = [];
  let cn = n, cd = d;
  for (let i = 0; i < count; i++) {
    terms.push([cn, cd]);
    cn += dn;
    cd += (i % 2 === 0 ? dd1 : dd2);
  }
  // All rendered fractions must be distinct
  const strs = terms.map(([a,b]) => fmtFrac(a,b));
  if (new Set(strs).size < count) return genFracAltDenom();
  return {
    terms: strs.slice(0, -1),
    answer: strs[strs.length-1],
    typeName: 'Fraction — Alternating Denominator Step',
    explanation: `Numerator +${dn}; denominator alternates +${dd1} and +${dd2}.`
  };
}

// G3: Denominator of each term = numerator of next (Fibonacci-like chain)
// Consecutive Fibonacci numbers are always coprime, so simplification never collapses terms.
function genFracChain() {
  const fibA = rand(1,4), fibB = rand(3,8);
  // fibA and fibB must differ, otherwise first two terms are equal
  if (fibA === fibB) return genFracChain();
  const count = rand(5, 7);
  const nums = [fibA, fibB];
  for (let i = 2; i < count + 1; i++) nums.push(nums[nums.length-1] + nums[nums.length-2]);
  const terms = [];
  for (let i = 0; i < count; i++) terms.push([nums[i], nums[i+1]]);
  const strs = terms.map(([a,b]) => fmtFrac(a,b));
  if (new Set(strs).size < count) return genFracChain();
  return {
    terms: strs.slice(0, -1),
    answer: strs[strs.length-1],
    typeName: 'Fraction — Denominator Chain',
    explanation: `Denominator of each term becomes the numerator of the next; numerators follow a Fibonacci-like pattern (${fibA}, ${fibB}…).`
  };
}

// G4: Numerator Fibonacci, denominator arithmetic
function genFracFibNum() {
  const a = rand(1,3), b = rand(2,5);
  const fibs = [a, b];
  for (let i = 2; i < 8; i++) fibs.push(fibs[fibs.length-1]+fibs[fibs.length-2]);
  const dStart = rand(2, 8), dStep = rand(1, 3);
  const count = rand(5, 7);
  const terms = Array.from({length: count}, (_, i) => [fibs[i], dStart + i * dStep]);
  // All rendered fractions must be distinct
  const strs = terms.map(([a,b]) => fmtFrac(a,b));
  if (new Set(strs).size < count) return genFracFibNum();
  return {
    terms: strs.slice(0, -1),
    answer: strs[strs.length-1],
    typeName: 'Fraction — Fibonacci Numerators',
    explanation: `Numerators follow a Fibonacci pattern (${fibs.slice(0,5).join(', ')}…); denominator +${dStep} each step.`
  };
}

// G5: Numerator arithmetic, denominator geometric
function genFracArithGeom() {
  let n = rand(2,8), d = rand(2,4), dn = rand(3,9), dr = rand(2,3);
  const count = rand(5, 6);
  const terms = [];
  let cn = n, cd = d;
  for (let i = 0; i < count; i++) {
    terms.push([cn, cd]);
    cn += dn; cd *= dr;
  }
  if (terms.some(([a,b])=>b>500)) return genFracBothArith();
  const strs = terms.map(([a,b]) => fmtFrac(a,b));
  if (new Set(strs).size < count) return genFracArithGeom();
  return {
    terms: strs.slice(0, -1),
    answer: strs[strs.length-1],
    typeName: 'Fraction — Arithmetic Numerator, Geometric Denominator',
    explanation: `Numerator +${dn} each step; denominator ×${dr} each step.`
  };
}

// G6: Both geometric (×rn numerator, ×rd denominator)
function genFracBothGeom() {
  let rn = rand(2,3), rd = rand(2,3), n = rand(1,5), d = rand(3,10);
  // If rn == rd every fraction simplifies to the same n/d — always trivial
  if (rn === rd) return genFracBothGeom();
  const count = rand(5, 6);
  const terms = [];
  let cn = n, cd = d;
  for (let i = 0; i < count; i++) {
    terms.push([cn, cd]);
    cn *= rn; cd *= rd;
  }
  if (terms.some(([a,b])=>b>1000||a>1000)) return genFracBothGeom();
  const strs = terms.map(([a,b]) => fmtFrac(a,b));
  // All must be distinct (catches cases where simplification makes terms repeat)
  if (new Set(strs).size < count) return genFracBothGeom();
  return {
    terms: strs.slice(0, -1),
    answer: strs[strs.length-1],
    typeName: 'Fraction — Both Geometric',
    explanation: `Numerator ×${rn}, denominator ×${rd} each step.`
  };
}

// H1: Fractions shown as decimals — n/(n+k) type (screenshot: 1/3, 2/4, 3/5...)
function genDecimalFracs() {
  const k = rand(1, 5);
  const start = rand(1, 4);
  const count = rand(5, 7);
  const terms = Array.from({length: count}, (_, i) => {
    const n = start + i;
    return parseFloat((n / (n+k)).toPrecision(5));
  });
  const lastN = start + count - 1;
  const ans = parseFloat((lastN / (lastN+k)).toPrecision(5));
  // format all as decimals
  const fmt = v => fmtDec(v, 5);
  return {
    terms: terms.slice(0, -1).map(fmt),
    answer: fmt(ans),
    typeName: 'Decimal Fractions',
    explanation: `Each term is <strong>n/(n+${k})</strong> for n = ${start}, ${start+1}, … Convert to fractions: ${start}/${start+k}, ${start+1}/${start+1+k}… The numerator and denominator each increase by 1.`
  };
}

// H2: Arithmetic sequence shown as decimals
function genDecimalArithmetic() {
  const choices = [0.1, 0.2, 0.25, 0.5, 0.15, 0.3, 0.05];
  const d = choices[rand(0, choices.length-1)] * (Math.random()<0.3?-1:1);
  const start = parseFloat((rand(0,4) + rand(0,9)*0.1).toFixed(1));
  const count = rand(5, 7);
  const terms = Array.from({length: count}, (_, i) => parseFloat((start + i*d).toFixed(4)));
  return {
    terms: terms.slice(0,-1).map(v=>fmtDec(v,5)),
    answer: fmtDec(terms[terms.length-1], 5),
    typeName: 'Decimal Arithmetic',
    explanation: `Each term changes by a constant <strong>${d > 0 ? '+' : ''}${d}</strong>.`
  };
}

// H3: Geometric sequence with ratio between 0 and 1 (shown as decimals)
function genGeomDecimal() {
  // Use ratio 1/2, 1/3, 2/3, or 3/4 for clean decimals
  const ratios = [[1,2],[1,3],[2,3],[3,4],[1,4]];
  const [rn, rd] = ratios[rand(0, ratios.length-1)];
  const start = rand(2, 8) * rd; // make sure first term divides cleanly
  const count = rand(5, 7);
  const terms = [];
  let cur = start;
  for (let i = 0; i < count; i++) {
    terms.push(parseFloat(cur.toPrecision(6)));
    cur = cur * rn / rd;
    if (cur < 0.001) break;
  }
  if (terms.length < 5) return genDecimalArithmetic();
  const fmt = v => fmtDec(v, 5);
  return {
    terms: terms.slice(0,-1).map(fmt), answer: fmt(terms[terms.length-1]),
    typeName: 'Geometric (Decimal)',
    explanation: `Each term is multiplied by <strong>${rn}/${rd}</strong> = ${(rn/rd).toFixed(4).replace(/0+$/,'')}.`
  };
}

// ════════════════════════════════════════════════════
//  CATEGORY I — MIXED / CREATIVE
// ════════════════════════════════════════════════════

// I1: Screenshot seq2 type — complex recurrence (next diff = 2×prev_diff − factor)
function genCompoundRecurrence() {
  // aₙ = aₙ₋₁ + diffₙ, where diffₙ = 2×diffₙ₋₁ − sub
  const sub = rand(2, 8);
  const d0 = rand(5, 20);
  const start = rand(5, 30);
  const count = rand(5, 7);
  const terms = [start];
  let diff = d0;
  for (let i = 1; i < count; i++) {
    terms.push(terms[terms.length-1] + diff);
    diff = 2 * diff - sub;
  }
  if (terms.some(t => t > 9999 || t < -999)) return genAcceleratingDiff();
  return {
    terms: terms.slice(0, -1), answer: terms[terms.length - 1],
    typeName: 'Compound Recurrence',
    explanation: `Each difference = <strong>2 × previous difference − ${sub}</strong>. Differences: ${d0}, ${2*d0-sub}, ${2*(2*d0-sub)-sub}…`
  };
}

// I2: Geometric sequence with a polynomial offset (aₙ = rⁿ + linear term)
function genGeomPlusPoly() {
  const r = rand(2, 3);
  const m = rand(1, 5), k = rand(0, 10);
  const startN = rand(0, 2);
  const count = rand(5, 6);
  const terms = Array.from({length: count}, (_, i) => {
    const n = startN + i;
    return Math.pow(r, n) + m * n + k;
  });
  if (terms.some(t => t > 9999)) return genLinearRecurrence();
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Exponential + Linear',
    explanation: `Each term = <strong>${r}ⁿ + ${m}n + ${k}</strong>. A geometric component plus a linearly growing component.`
  };
}

// I3: Product of two arithmetic sequences
function genProductArith() {
  const a0 = rand(1,5), da = rand(1,3), b0 = rand(1,5), db = rand(1,3);
  const count = rand(5,7);
  const terms = Array.from({length: count}, (_,i) => (a0+i*da) * (b0+i*db));
  if (terms.some(t=>t>9999)) return genConstantSecondDiff();
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Product of Two Arithmetic Sequences',
    explanation: `Each term = <strong>(${a0}+${da}n) × (${b0}+${db}n)</strong>. Equivalently, both factors step up by ${da} and ${db}.`
  };
}

// I4: Steps grow then shrink (pyramid-shaped differences)
function genPyramidDiff() {
  const peak = rand(3,6);
  const diffs = [];
  for (let i = 1; i <= peak; i++) diffs.push(i);
  for (let i = peak-1; i >= 1; i--) diffs.push(i);
  const start = rand(5,20);
  const count = Math.min(rand(6,9), diffs.length+1);
  const terms = [start];
  for (let i = 0; i < count-1; i++) terms.push(terms[terms.length-1] + diffs[i]);
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Pyramid Differences',
    explanation: `Differences increase then decrease: <strong>${diffs.slice(0,peak).join(', ')}, ${diffs.slice(peak).join(', ')}…</strong>`
  };
}

// I5: Alternating multiply and add to different registers (screenshot seq1 variation)
function genMultiDiff() {
  const r = rand(2, 3), start = rand(3, 15), c = rand(2, 8);
  // aₙ = r·aₙ₋₂ + c  (every two steps, multiply by r, plus c)
  const count = rand(6, 8);
  const terms = [start, start + rand(2,6)];
  for (let i = 2; i < count; i++) terms.push(r * terms[terms.length-2] + c);
  if (terms.some(t=>t>9999)) return genLinearRecurrence();
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Skip-one Recurrence',
    explanation: `Each term = <strong>${r} × the term two before it + ${c}</strong>.`
  };
}

// I6: Running total — cumulative sums of primes
function genCumSumPrimes() {
  const primes = getPrimes(10);
  const startIdx = rand(0, 3);
  const count = rand(5, 7);
  let s = 0;
  const terms = [];
  for (let i = startIdx; i < startIdx + count; i++) {
    s += primes[i];
    terms.push(s);
  }
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Cumulative Sum of Primes',
    explanation: `Running total of consecutive primes: <strong>+${primes[startIdx]}, +${primes[startIdx+1]}, +${primes[startIdx+2]}…</strong>`
  };
}

// ── EXTRA NEW TYPES ──

// J1: Sum of position index and previous term: aₙ = aₙ₋₁ + n
function genAddIndex() {
  const a0 = rand(1, 15);
  const mult = rand(1, 3); // add mult*n each step
  const count = rand(5, 7);
  const terms = [a0];
  for (let i = 1; i < count; i++) terms.push(terms[terms.length-1] + mult * i);
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Add Position Index',
    explanation: `Each term = previous + <strong>${mult === 1 ? 'step number' : mult+'×step number'}</strong>: +${mult}, +${2*mult}, +${3*mult}, +${4*mult}…`
  };
}

// J2: Differences alternate between two fixed values (a, b, a, b…)
// Distinct from cyclic because it's strictly 2-cycle and creates a clear zigzag
function genAltTwoDiffs() {
  const d1 = rand(3, 10), d2 = rand(2, 9);
  if (d1 === d2) return genAltTwoDiffs();
  const start = rand(5, 30);
  const count = rand(7, 9);
  const terms = [start];
  for (let i = 1; i < count; i++) terms.push(terms[terms.length-1] + (i%2===1 ? d1 : d2));
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Alternating Two Differences',
    explanation: `Differences alternate between <strong>+${d1}</strong> and <strong>+${d2}</strong>.`
  };
}

// J3: Partial sums of a geometric sequence
function genPartialSumGeom() {
  const r = rand(2, 3), a = rand(1, 4);
  const count = rand(5, 6);
  let s = 0;
  const terms = [];
  for (let i = 0; i < count; i++) {
    s += a * Math.pow(r, i);
    terms.push(s);
  }
  if (terms.some(t => t > 9999)) return genArithmetic();
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Partial Sums of Geometric',
    explanation: `Running total of a geometric sequence (×${r}): add <strong>${a}, ${a*r}, ${a*r*r}, ${a*r*r*r}…</strong>`
  };
}

// J4: Fraction sequence where each term = previous × (n+1)/n (telescoping product)
function genFracTelescoping() {
  // a_n = start × (k+1)/k × (k+2)/(k+1) × ... — but show the raw values
  // Simpler: terms are start×(n/d) where n and d each step by different amounts
  // Equivalent: aₙ = a₀ × product_of_ratios
  const a = rand(1,4), b = rand(2,5), da = rand(1,3), db = rand(1,3);
  if (da === db) return genFracTelescoping();
  const count = rand(5, 7);
  const terms = [];
  let cn = a, cd = b;
  for (let i = 0; i < count; i++) {
    const g = gcd(Math.abs(cn), cd);
    terms.push([cn/g, cd/g]);
    cn += da; cd += db;
  }
  // Check none reduce to same value
  const strs = terms.map(([n,d]) => fmtFrac(n,d));
  if (new Set(strs).size < count) return genFracTelescoping();
  return {
    terms: strs.slice(0,-1), answer: strs[strs.length-1],
    typeName: 'Fraction — Stepped Numerator & Denominator',
    explanation: `Numerator steps +${da}, denominator steps +${db} each term. Track each separately.`
  };
}

// J5: Geometric sequence where ratio itself grows by 1 each step
function genGrowingRatio() {
  const start = rand(1, 5);
  const baseR = rand(2, 3);
  const count = rand(5, 6);
  const terms = [start];
  for (let i = 1; i < count; i++) terms.push(terms[terms.length-1] * (baseR + i - 1));
  if (terms.some(t => t > 50000)) return genGeometric();
  return {
    terms: terms.slice(0,-1), answer: terms[terms.length-1],
    typeName: 'Growing Ratio',
    explanation: `Each term is multiplied by an increasing factor: ×${baseR}, ×${baseR+1}, ×${baseR+2}… (ratio increases by 1 each step).`
  };
}

// J6: Decimal sequence: each term = 1/n² shown as decimal
function genReciprocalSquares() {
  const startN = rand(1, 3);
  const count = rand(5, 7);
  const fmt = v => fmtDec(v, 5);
  const terms = Array.from({length: count}, (_, i) => parseFloat((1/((startN+i)*(startN+i))).toPrecision(5)));
  if (terms[terms.length-1] < 0.001) return genDecimalFracs();
  return {
    terms: terms.slice(0,-1).map(fmt), answer: fmt(terms[terms.length-1]),
    typeName: 'Reciprocal Squares (Decimal)',
    explanation: `Terms are <strong>1/n²</strong>: 1/${startN}² = ${fmt(terms[0])}, 1/${startN+1}² = ${fmt(terms[1])}… Note the pattern of which squares appear.`
  };
}

// ── safe generator with retry ──
function generateQuestion(maxTries = 30) {
  for (let attempt = 0; attempt < maxTries; attempt++) {
    try {
      const genFn = SEQUENCE_GENERATORS[rand(0, SEQUENCE_GENERATORS.length - 1)];
      const q = genFn();
      // Sanity checks
      if (!q || !q.terms || q.terms.length < 4) continue;
      if (q.answer === undefined || q.answer === null) continue;
      const ansStr = String(q.answer);
      // Keep numbers reasonable
      const numeric = parseFloat(ansStr.replace('/', '.').replace(/[^0-9.\-]/g,''));
      if (!isFinite(numeric) || Math.abs(numeric) > 99999) continue;
      // Make sure all terms are finite / valid-looking
      const valid = q.terms.every(t => {
        const s = String(t);
        if (s.includes('/')) {
          const [n,d] = s.split('/').map(Number);
          return isFinite(n) && isFinite(d) && d !== 0 && Math.abs(n) < 9999 && Math.abs(d) < 9999;
        }
        const v = Number(s);
        return isFinite(v) && Math.abs(v) < 99999;
      });
      if (!valid) continue;
      return q;
    } catch(e) { /* retry */ }
  }
  // fallback: plain arithmetic
  return genArithmetic();
}

// ── distractor generation ──
function makeDistractors(answerStr, terms) {
  const isFrac = answerStr.includes('/');
  // Detect decimal: has a dot, is not a fraction, and is not a plain integer
  const isDecimal = !isFrac && answerStr.includes('.');
  const distractors = new Set();
  distractors.add(answerStr);

  if (isFrac) {
    const [n, d] = answerStr.split('/').map(Number);
    const deltas = [-3,-2,-1,1,2,3,4,5,-4,-5,6,7,-6,-7];
    for (const dn of deltas) {
      for (const dd of [-2,-1,0,1,2]) {
        if (distractors.size >= 5) break;
        const nn = n + dn, nd = d + dd;
        if (nd > 0 && nn > 0) {
          const s = fmtFrac(nn, nd);
          if (s !== answerStr) distractors.add(s);
        }
      }
      if (distractors.size >= 5) break;
    }
    let extra = 1;
    while (distractors.size < 5) { distractors.add(fmtFrac(n + extra*3, d + extra)); extra++; }

  } else if (isDecimal) {
    const ans = Number(answerStr);
    // Work out decimal places to use
    const dp = (answerStr.split('.')[1] || '').length;
    const step = Math.pow(10, -dp);
    const bigStep = step * 5;
    const deltas = [step, -step, bigStep, -bigStep, step*2, -step*2, step*3, -step*3,
                    step*10, -step*10, step*15, -step*15, step*20, -step*20];
    // shuffle
    for (let i = deltas.length-1; i>0; i--) {
      const j = rand(0,i); [deltas[i],deltas[j]] = [deltas[j],deltas[i]];
    }
    for (const d of deltas) {
      if (distractors.size >= 5) break;
      const v = parseFloat((ans + d).toFixed(dp + 1));
      if (!isFinite(v)) continue;
      const s = fmtDec(v, 6);
      if (s !== answerStr && !distractors.has(s)) distractors.add(s);
    }
    let extra = 1;
    while (distractors.size < 5) {
      const v = parseFloat((ans + extra * step * 7).toFixed(dp+1));
      distractors.add(fmtDec(v, 6)); extra++;
    }

  } else {
    const ans = Number(answerStr);
    // Generate plausible nearby integers
    // Scale deltas to the magnitude of the answer for large numbers
    const scale = Math.max(1, Math.round(Math.abs(ans) * 0.05));
    const deltas = [];
    for (let i = 1; deltas.length < 30; i++) {
      deltas.push(i, -i, i*scale, -i*scale, i*2, -i*2);
    }
    for (let i = deltas.length-1; i>0; i--) {
      const j = rand(0,i); [deltas[i],deltas[j]] = [deltas[j],deltas[i]];
    }
    for (const d of deltas) {
      if (distractors.size >= 5) break;
      const v = ans + d;
      if (!Number.isInteger(v)) continue;
      const s = String(v);
      if (s !== answerStr && !distractors.has(s)) distractors.add(s);
    }
    let extra = 1;
    while (distractors.size < 5) { distractors.add(String(ans + extra * (scale||7))); extra++; }
  }

  const arr = Array.from(distractors);
  for (let i = arr.length-1; i>0; i--) {
    const j = rand(0,i); [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

//  PRACTICE GAME
// ══════════════════════════════════════════════════════
function startSeqPractice() {
  const g = myGen();
  function alive() { return myGen() === g; }
  let correct = 0, total = 0;

  function stat() {
    if (!alive()) return;
    setStats(`<div class="stat-pill">Correct <b>${correct}</b>/${total}</div>`);
  }

  function nextQuestion() {
    if (!alive()) return;
    const q = generateQuestion();
    const choices = makeDistractors(String(q.answer), q.terms);

    stat();

    // Build terms HTML — no ellipsis; the blank box serves as the visual end
    const termsHTML = q.terms.map((t) =>
      `<span class="seq-term">${t}</span><span class="seq-comma">,</span>`
    ).join('') +
    `<span class="seq-blank" id="seq-blank">?</span>`;

    const choicesHTML = choices.map(c =>
      `<button class="seq-choice" onclick="seqPick(this, '${c.replace(/'/g,"\\'")}', '${String(q.answer).replace(/'/g,"\\'")}', '${q.explanation.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
        ${c}
      </button>`
    ).join('');

    setPanel(`<div class="seq-wrap">
      <div class="seq-type-toggle">
        <button class="seq-type-toggle-btn" id="type-toggle-btn" onclick="seqToggleType()">
          <span class="seq-toggle-dot"></span>Show type
        </button>
        <span class="seq-type-label" id="type-label">${q.typeName}</span>
      </div>
      <div class="seq-question-label">What comes next?</div>
      <div class="seq-terms">${termsHTML}</div>
      <div class="seq-choices" id="seq-choices">${choicesHTML}</div>
      <div id="seq-feedback"></div>
    </div>`, true);

    window.seqToggleType = () => {
      const btn = document.getElementById('type-toggle-btn');
      const lbl = document.getElementById('type-label');
      if (!btn || !lbl) return;
      const on = btn.classList.toggle('revealed');
      lbl.classList.toggle('visible', on);
      btn.innerHTML = `<span class="seq-toggle-dot"></span>${on ? 'Hide type' : 'Show type'}`;
    };
  }

  window.seqPick = (btn, chosen, answer, explanation) => {
    if (!alive()) return;
    // Disable all choices
    document.querySelectorAll('.seq-choice').forEach(b => { b.disabled = true; });

    const isCorrect = chosen === answer;
    if (isCorrect) {
      correct++;
      btn.classList.add('correct');
    } else {
      btn.classList.add('wrong');
      // reveal correct
      document.querySelectorAll('.seq-choice').forEach(b => {
        if (b.textContent.trim() === answer) b.classList.add('reveal-correct');
      });
    }
    total++;
    stat();

    // Update blank
    const blank = document.getElementById('seq-blank');
    if (blank) {
      blank.textContent = answer;
      blank.classList.add(isCorrect ? 'filled-correct' : 'filled-wrong');
    }

    // Show explanation + Next
    const fb = document.getElementById('seq-feedback');
    if (fb) {
      fb.innerHTML = `
        <div class="seq-explanation"><strong>Pattern:</strong> ${explanation}</div>
        <button class="seq-next-btn" onclick="seqNext()">Next →</button>`;
    }
  };

  window.seqNext = () => {
    if (!alive()) return;
    nextQuestion();
  };

  setPanel(`<div class="start-card">
    <h3>Sequence Practice</h3>
    <p>Identify the pattern in each sequence and choose the next number. Covers arithmetic, geometric, prime-based, Fibonacci-type, fractional sequences, and many more.</p>
    <button class="big-btn" onclick="seqGo()">Begin</button>
  </div>`);
  stat();

  window.seqGo = () => { if (!alive()) return; nextQuestion(); };
}

  // ── Generate diverse question set ──

  // We'll draw ~8 easy, ~10 medium, ~8 hard
  const easyGens   = [genArithmetic, genGeometric, genPrimesSequence, genConstantSecondDiff,
                      genAlternatingAddSub, genAltTwoDiffs, genAddIndex, genFibonacciType,
                      genPowers, genFactorials];
  const mediumGens  = [genAcceleratingDiff, genGeomDiff, genLinearRecurrence, genAltMultAdd,
                       genAltMultSub, genAddPrimes, genEveryOtherPrime, genInterleavedArithmetic,
                       genDigitSum, genDigitProduct, genCyclicDiff, genFibDiffs,
                       genDiffOfTwo, genTribonacci, genDecimalArithmetic, genDecimalFracs,
                       genFracBothArith, genAltSignGeomDiff, genPyramidDiff, genProductArith];
  const hardGens    = [genCompoundRecurrence, genConvergingDiff, genTwoTermRecurrence,
                       genRollingAverage, genInterleavedGeometric, genInterleavedArithGeom,
                       genPrimesSecondDiff, genFracChain, genFracFibNum, genFracArithGeom,
                       genFracBothGeom, genFracAltDenom, genFracTelescoping, genGeomDecimal,
                       genReciprocalSquares, genMultiDiff, genGrowingRatio, genPartialSumGeom,
                       genCumSumPrimes, genGeomPlusPoly, genDigitRotation];

  function pickDiverse(pool, needed) {
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    const result = [];
    for (const fn of shuffled) {
      if (result.length >= needed) break;
      let q = null;
      for (let t = 0; t < 15; t++) {
        try { q = fn(); if (q && q.terms && q.terms.length >= 4) break; } catch(e) {}
      }
      if (q) result.push(q);
    }
    // If pool ran dry, top up with random
    while (result.length < needed) result.push(generateQuestion());
    return result;
  }

  let questions = [
    ...pickDiverse(easyGens,   8),
    ...pickDiverse(mediumGens, 10),
    ...pickDiverse(hardGens,   8),
  ];
  // Shuffle the order
  questions = questions.sort(() => Math.random() - 0.5);
  // Pre-generate choices for every question
  const allChoices = questions.map(q => makeDistractors(String(q.answer), q.terms));

  // State
  let currentIdx = 0;
  // answers[i] = chosen string, or null (unanswered/skipped)
  const answers = new Array(TOTAL).fill(null);
  let timerInterval = null;
  let timeLeft = TIME_LIMIT;
  let submitted = false;
  let reviewIdx = 0;

  // ── Timer ──
  function startTimer() {
    timerInterval = setInterval(() => {
      if (!alive()) { clearInterval(timerInterval); return; }
      timeLeft--;
      renderTimerDisplay();
      if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(); }
    }, 1000);
  }

  function fmtTime(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function renderTimerDisplay() {
    const el = document.getElementById('test-timer');
    if (!el) return;
    el.textContent = fmtTime(timeLeft);
    el.className = 'test-timer' + (timeLeft <= 60 ? ' warn' : '');
  }

  // ── Main render ──
  function renderQuestion(idx) {
    currentIdx = idx;
    const q = questions[idx];
    const choices = allChoices[idx];
    const answered = answers[idx];

    const termsHTML = q.terms.map(t =>
      `<span class="seq-term">${t}</span><span class="seq-comma">,</span>`
    ).join('') + `<span class="seq-blank" id="seq-blank">${answered !== null ? answered : '?'}</span>`;

    const choicesHTML = choices.map(c => {
      let cls = 'seq-choice';
      let disabled = ''; // always re-answerable during test
      if (answered !== null && c === answered) cls += ' selected'; // neutral highlight, no color feedback
      return `<button class="${cls}" ${disabled} onclick="testPick('${c.replace(/'/g,"\'")}', ${idx})">${c}</button>`;
    }).join('');

    // Q-dot grid
    const dotHTML = questions.map((_, i) => {
      let cls = 'test-q-dot';
      if (i === idx) cls += ' active';
      else if (answers[i] !== null) cls += ' answered';
      else cls += ' skipped';
      return `<button class="${cls}" onclick="testGoto(${i})">${i+1}</button>`;
    }).join('');

    // All answered?
    const allDone = answers.every(a => a !== null);

    setPanel(`<div class="seq-wrap">
      <div class="test-nav-bar">
        <span class="test-q-counter">Q ${idx+1} / ${TOTAL}</span>
        <div class="test-nav-arrows">
          <button class="test-arrow" onclick="testGoto(${idx-1})" ${idx===0?'disabled':''}>&#8592;</button>
          <button class="test-arrow" onclick="testGoto(${idx+1})" ${idx===TOTAL-1?'disabled':''}>&#8594;</button>
        </div>
        <span class="test-timer" id="test-timer">${fmtTime(timeLeft)}</span>
      </div>
      <div class="seq-question-label">What comes next?</div>
      <div class="seq-terms" id="test-terms">${termsHTML}</div>
      <div class="seq-choices" id="seq-choices">${choicesHTML}</div>
      ${answered !== null
        ? `<div style="display:flex;gap:8px;margin-top:10px">
             <button class="test-skip-btn" style="flex:1;margin-top:0" onclick="testClear(${idx})">✕ Clear answer</button>
             <button class="test-skip-btn" style="flex:1;margin-top:0" onclick="testSkip(${idx})">Skip →</button>
           </div>`
        : `<button class="test-skip-btn" onclick="testSkip(${idx})">Skip →</button>`
      }
      <div class="test-q-grid">${dotHTML}</div>
      <div class="test-submit-row">
        <button class="test-submit-btn" onclick="testSubmitConfirm()">Submit test</button>
      </div>
    </div>`, true);

    // Keep timer ticking
    renderTimerDisplay();
  }

  window.testPick = (chosen, idx) => {
    if (!alive() || submitted) return;
    answers[idx] = chosen;
    renderQuestion(idx);
    // Auto-advance to next unanswered after a short pause
    setTimeout(() => {
      if (!alive() || submitted) return;
      // Find next unanswered
      let next = -1;
      for (let i = idx + 1; i < TOTAL; i++) { if (answers[i] === null) { next = i; break; } }
      if (next === -1) for (let i = 0; i < idx; i++) { if (answers[i] === null) { next = i; break; } }
      if (next !== -1) renderQuestion(next);
      // else stay — all answered, user can submit
    }, 350);
  };

  window.testSkip = (idx) => {
    if (!alive() || submitted) return;
    // Move to next (skips stay null)
    const next = (idx + 1) % TOTAL;
    renderQuestion(next);
  };

  window.testClear = (idx) => {
    if (!alive() || submitted) return;
    answers[idx] = null;
    renderQuestion(idx);
  };

  window.testGoto = (idx) => {
    if (!alive() || submitted) return;
    if (idx < 0 || idx >= TOTAL) return;
    renderQuestion(idx);
  };

  window.testSubmitConfirm = () => {
    if (!alive() || submitted) return;
    const unanswered = answers.filter(a => a === null).length;
    if (unanswered > 0) {
      // Briefly flash unanswered dots, then confirm
      if (!window._testConfirmPending) {
        window._testConfirmPending = true;
        // Show a confirmation overlay in the submit row
        const row = document.querySelector('.test-submit-row');
        if (row) row.innerHTML = `
          <div style="text-align:center;font-size:.84rem;color:var(--text2);margin-bottom:8px">
            ${unanswered} question${unanswered>1?'s':''} unanswered — they score 0.
          </div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button class="test-submit-btn" style="background:var(--red)" onclick="submitTest()">Submit anyway</button>
            <button class="test-submit-btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="testCancelConfirm()">Keep going</button>
          </div>`;
        return;
      }
    }
    submitTest();
  };

  window.testCancelConfirm = () => {
    window._testConfirmPending = false;
    renderQuestion(currentIdx);
  };

  window.submitTest = function submitTest() {
    if (!alive()) return;
    submitted = true;
    window._testConfirmPending = false;
    clearInterval(timerInterval);

    // Compute score
    let correct = 0, incorrect = 0, skipped = 0;
    answers.forEach((a, i) => {
      if (a === null) { skipped++; }
      else if (a === String(questions[i].answer)) { correct++; }
      else { incorrect++; }
    });
    const score = correct - incorrect;

    // Save best
    const prev = seqScores['seq-test'];
    const isNewBest = prev == null || score > prev.v;
    saveSeqScore('seq-test', score, `${score > 0 ? '+' : ''}${score}`);
    renderDashboard(); // update card

    // Show results screen
    reviewIdx = 0;
    renderResultsScreen(correct, incorrect, skipped, score, isNewBest);
  }

  function renderResultsScreen(correct, incorrect, skipped, score, isNewBest) {
    const scoreStr = score > 0 ? `+${score}` : String(score);
    const bestLabel = getSeqScoreLabel('seq-test');
    setStats('');
    setPanel(`<div class="seq-wrap">
      <div class="test-review-header">
        <div class="test-score-big">${scoreStr}</div>
        <div class="test-score-sub">Score = correct − incorrect &nbsp;(skips = 0)</div>
        <div class="test-score-pills">
          <span class="test-score-pill green">✓ ${correct} correct</span>
          <span class="test-score-pill red">✗ ${incorrect} incorrect</span>
          <span class="test-score-pill">⊘ ${skipped} skipped</span>
          ${isNewBest ? '<span class="test-score-pill best">★ New best!</span>' : (bestLabel ? `<span class="test-score-pill best">Best: ${bestLabel}</span>` : '')}
        </div>
      </div>
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);text-align:center;margin-bottom:10px">Review answers</div>
      <div id="review-body"></div>
    </div>`, true);

    renderReview(0);
  }

  function renderReview(idx) {
    reviewIdx = idx;
    const q = questions[idx];
    const choices = allChoices[idx];
    const userAnswer = answers[idx];
    const correctAnswer = String(q.answer);
    const isCorrect = userAnswer !== null && userAnswer === correctAnswer;
    const isSkipped = userAnswer === null;

    const termsHTML = q.terms.map(t =>
      `<span class="seq-term">${t}</span><span class="seq-comma">,</span>`
    ).join('') + `<span class="seq-blank ${isCorrect?'filled-correct':isSkipped?'':'filled-wrong'}">${isSkipped ? '—' : userAnswer}</span>`;

    const choicesHTML = choices.map(c => {
      let cls = 'seq-choice';
      if (c === correctAnswer) cls += ' reveal-correct';
      else if (c === userAnswer && !isCorrect) cls += ' wrong';
      return `<button class="${cls}" disabled>${c}</button>`;
    }).join('');

    const dotHTML = questions.map((_, i) => {
      const ua = answers[i];
      const ca = String(questions[i].answer);
      let cls = 'test-q-dot';
      if (i === idx) cls += ' active';
      else if (ua === null) cls += ' skipped';
      else if (ua === ca) cls += ' dot-correct';
      else cls += ' dot-wrong';
      return `<button class="${cls}" onclick="testReviewGoto(${i})">${i+1}</button>`;
    }).join('');

    const statusLabel = isSkipped
      ? `<span style="color:var(--muted);font-size:.82rem">Skipped</span>`
      : isCorrect
        ? `<span style="color:var(--green);font-size:.82rem;font-weight:700">✓ Correct</span>`
        : `<span style="color:var(--red);font-size:.82rem;font-weight:700">✗ Incorrect</span>`;

    document.getElementById('review-body').innerHTML = `
      <div class="test-review-nav">
        <button class="test-arrow" onclick="testReviewGoto(${idx-1})" ${idx===0?'disabled':''}>&#8592;</button>
        <div class="test-review-q-label">Q ${idx+1} / ${TOTAL} &nbsp;•&nbsp; ${q.typeName}</div>
        <button class="test-arrow" onclick="testReviewGoto(${idx+1})" ${idx===TOTAL-1?'disabled':''}>&#8594;</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="seq-question-label" style="margin:0">What comes next?</div>
        ${statusLabel}
      </div>
      <div class="seq-terms">${termsHTML}</div>
      <div class="seq-choices">${choicesHTML}</div>
      <div class="seq-explanation" style="margin-top:14px"><strong>Pattern:</strong> ${q.explanation}</div>
      <div class="test-q-grid" style="margin-top:16px">${dotHTML}</div>
    `;
  }

  window.testReviewGoto = (idx) => {
    if (!alive()) return;
    if (idx < 0 || idx >= TOTAL) return;
    renderReview(idx);
  };

  // ── Start ──
  setPanel(`<div class="start-card">
    <h3>Sequence Test</h3>
    <p>26 questions &nbsp;·&nbsp; 25 minutes</p>
    <p style="font-size:.85rem;color:var(--text2);margin-top:8px">Navigate freely between questions. Skip any question and return later. Correct answers and explanations are revealed after you submit.</p>
    <p style="font-size:.82rem;color:var(--text2);margin-top:6px"><strong>Score = correct − incorrect.</strong> Skipped questions score 0.</p>
    <button class="big-btn" onclick="testBegin()" style="margin-top:20px">Begin test →</button>
  </div>`);

  window.testBegin = () => {
    if (!alive()) return;
    startTimer();
    renderQuestion(0);
  };
}

// ── init ──
renderDashboard();
</script>
</body>
</html>
