  // ── Stats screen & scoring ─────────────────────────
  function expectedValue(def,x,centsPerPump,penalty){
    let survival=1.0;
    for(let n=1;n<=x;n++){const h=Math.min(1,def.popBase*Math.exp(def.popGrowth*(n-1)));survival*=(1-h);}
    return survival*x*centsPerPump-(1-survival)*penalty;
  }
  function optimalPumps(def,centsPerPump,penalty,maxSearch=25){
    let bestX=1,bestEV=-Infinity;
    for(let x=1;x<=maxSearch;x++){const ev=expectedValue(def,x,centsPerPump,penalty);if(ev>bestEV){bestEV=ev;bestX=x;}}
    return{x:bestX,ev:bestEV};
  }
  function adjustedAvg(balloons,optX){
    if(!balloons||!balloons.length)return null;
    const inc=balloons.filter(b=>b.cashed||b.pumps>optX);
    if(!inc.length)return null;
    return inc.reduce((s,b)=>s+b.pumps,0)/inc.length;
  }
  function popDistribution(def,maxY=15){
    const dist=[];let survival=1.0;
    for(let y=1;y<=maxY;y++){
      const h=Math.min(1,def.popBase*Math.exp(def.popGrowth*(y-1)));
      dist.push(Math.max(0,survival*h));
      survival=Math.max(0,survival*(1-h));
    }
    return{dist,surviveAll:survival};
  }

  function bartShowStats(){
    if(!alive())return;
    bartState='stats_screen';

    const MAX_Y=15,CW=148,CH=90;
    const allDists=BALLOON_DEFS.map(d=>popDistribution(d,MAX_Y));
    const globalMax=Math.max(...allDists.flatMap(r=>r.dist),0.001);

    // ── Compute score ──
    let greenCount=0;
    BALLOON_DEFS.forEach((d)=>{
      ROUND_CFG.forEach((cfg,ri)=>{
        const opt=optimalPumps(d,cfg.centsPerPump,cfg.penalty);
        const avg=adjustedAvg(bSetStats[d.name].balloonsByRound[ri],opt.x);
        if(avg!==null&&Math.abs(avg-opt.x)<=0.8)greenCount++;
      });
    });
    const scoreLabel=`$${totalEarned.toFixed(2)} @ ${greenCount}/6`;
    saveScore('bart',totalEarned,scoreLabel);
    setStats(`<div class="stat-pill">Earned <b>$${totalEarned.toFixed(2)}</b></div><div class="stat-pill">Green <b>${greenCount}/6</b></div>`);

    let cardsHtml=BALLOON_DEFS.map((d)=>{
      const di=BALLOON_DEFS.indexOf(d);
      const{dist}=allDists[di];
      const opt1=optimalPumps(d,ROUND_CFG[0].centsPerPump,ROUND_CFG[0].penalty);
      const opt2=optimalPumps(d,ROUND_CFG[1].centsPerPump,ROUND_CFG[1].penalty);
      const avg1=adjustedAvg(bSetStats[d.name].balloonsByRound[0],opt1.x);
      const avg2=adjustedAvg(bSetStats[d.name].balloonsByRound[1],opt2.x);
      function fmtAvg(avg,opt){
        if(avg===null)return`<span style="color:var(--muted)">no data</span>`;
        const diff=avg-opt;
        const col=Math.abs(diff)<=0.8?'var(--green)':diff<0?'var(--red)':'var(--yellow)';
        const sign=diff>0?'+':'';
        return`<span style="color:${col}">${avg.toFixed(1)} pumps (${sign}${diff.toFixed(1)} vs opt)</span>`;
      }
      function evLbl(opt,cfg){const ev=expectedValue(d,opt.x,cfg.centsPerPump,cfg.penalty);return`<b style="color:var(--accent)">${opt.x}</b> pumps · EV=$${ev.toFixed(2)}`;}
      const cid=`bc-${d.name}`;
      const barsJson=JSON.stringify(dist.map(p=>+(p*100).toFixed(3)));
      return`<div style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:.85rem">
          <span style="width:10px;height:10px;border-radius:50%;background:${d.color};display:inline-block;flex-shrink:0"></span>${d.name}
        </div>
        <canvas id="${cid}" width="${CW}" height="${CH}" data-bars='${barsJson}' data-gmax='${(globalMax*100).toFixed(3)}' data-color='${d.color}' style="width:100%;height:auto;border-radius:4px;background:#fff"></canvas>
        <div style="font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text2);line-height:1.7;border-top:1px solid var(--border);padding-top:6px">
          <span style="color:var(--muted);font-size:.6rem">OPT R1</span><br>${evLbl(opt1,ROUND_CFG[0])}<br>
          <span style="color:var(--muted);font-size:.6rem">OPT R2</span><br>${evLbl(opt2,ROUND_CFG[1])}<br>
          <span style="color:var(--muted);font-size:.6rem">YOUR AVG</span><br>R1: ${fmtAvg(avg1,opt1.x)}<br>R2: ${fmtAvg(avg2,opt2.x)}
        </div>
      </div>`;
    }).join('');

    setPanel(`<div style="width:100%;display:flex;flex-direction:column;gap:16px">
      <div style="text-align:center">
        <div style="font-family:'Instrument Serif',serif;font-size:1.5rem;margin-bottom:4px">BART Complete</div>
        <div style="font-family:'DM Mono',monospace;font-size:.8rem;color:var(--muted)">Pop probability analysis — your average vs optimal pump count</div>
      </div>
      <div style="display:flex;gap:10px;width:100%">${cardsHtml}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);text-align:center">
        <span style="color:var(--green)">●</span> near-optimal &nbsp;
        <span style="color:var(--red)">●</span> under-pumping &nbsp;
        <span style="color:var(--yellow)">●</span> over-pumping
      </div>
      <div style="text-align:center">
        <div style="font-family:'Instrument Serif',serif;font-size:2.5rem;color:var(--accent)">${scoreLabel}</div>
        <div style="color:var(--muted);font-size:.82rem;margin-bottom:20px">total earned · green averages</div>
        <button class="again-btn" onclick="startBART()">Play again</button>
      </div>
    </div>`,true);

    requestAnimationFrame(()=>{
      const dpr=window.devicePixelRatio||1;
      BALLOON_DEFS.forEach(d=>{
        const canvas=document.getElementById(`bc-${d.name}`);if(!canvas)return;
        const bars=JSON.parse(canvas.dataset.bars);
        const maxVal=parseFloat(canvas.dataset.gmax);
        const color=canvas.dataset.color;
        // Scale canvas buffer by dpr for sharpness
        const cssW=canvas.offsetWidth||148;
        const cssH=Math.round(cssW*(90/148));
        canvas.width=Math.round(cssW*dpr);
        canvas.height=Math.round(cssH*dpr);
        canvas.style.width=cssW+'px';
        canvas.style.height=cssH+'px';
        const ctx=canvas.getContext('2d');
        ctx.scale(dpr,dpr);
        const W=cssW,H=cssH;
        const n=bars.length;
        const padT=3,padB=14,chartH=H-padT-padB;
        const barW=W/n;
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
        bars.forEach((val,i)=>{
          const x=i*barW;const bH=(val/maxVal)*chartH;const y=padT+(chartH-bH);
          ctx.fillStyle=color+'cc';ctx.fillRect(x+0.5,y,barW-1,bH);
          ctx.fillStyle=color;ctx.fillRect(x+0.5,y,barW-1,1.5);
          if(i%2===0||i===n-1){ctx.fillStyle='rgba(0,0,0,0.45)';ctx.font=`${7}px DM Mono,monospace`;ctx.textAlign='center';ctx.fillText(String(i+1),x+barW/2,H-2);}
        });
        ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-padB);ctx.lineTo(W,H-padB);ctx.stroke();
      });
    });
  }

  // ── Render the game panel HTML ─────────────────────
  setStats('');
  setPanel(`<div class="bart-wrap">
    <div class="start-card">
      <h3>BART</h3>
      <p>Pump balloons to earn money — but pump too much and they pop! Two rounds: 30 balloons at $0.10/pump, then 20 at $0.20/pump with a pop penalty. Find the sweet spot between greed and caution.</p>
      <button class="big-btn" onclick="bartGo()">Begin</button>
    </div>
  </div>`);

  window.bartSkipRound=bartSkipRound;
  window.bartGo=()=>{
    if(!alive())return;
    setPanel(`<div class="bart-wrap">
      <div class="bart-game">
        <div class="bart-arena" id="bart-arena"></div>
        <div class="bart-btn-row">
          <button class="bart-btn bart-pump-btn" id="bart-pump-btn" onclick="bartPump()">Pump</button>
          <button class="bart-btn bart-cash-btn" id="bart-cash-btn" onclick="bartCash()">Cash Out</button>
        </div>
        <div class="bart-stats-row">
          <div class="bart-stat-cell"><div class="bart-stat-label">This Balloon</div><div class="bart-stat-val" id="b2-balloon">$0.00</div></div>
          <div class="bart-stat-cell"><div class="bart-stat-label">Round Earned</div><div class="bart-stat-val" id="b2-round2">$0.00</div></div>
          <div class="bart-stat-cell"><div class="bart-stat-label">Total Earned</div><div class="bart-stat-val" id="b2-total">$0.00</div></div>
        </div>
      </div>
    </div>`,true);
    resetBART();
  };
}

// ══════════════════════════════════════════════════════
//  FULL TEST — runs all 9 games in random order
// ══════════════════════════════════════════════════════
function startTest(){
  const TEST_IDS=['shapeshift','codecompare','pincode','numberbox','figureitout','theswitch','stockmaster','bart','skyscraper'];
  const order=[...TEST_IDS].sort(()=>Math.random()-.5);
  let idx=0;
  const testScores={};

  window._testAdvance=function(){
    if(idx>=order.length){showTestResults();return;}
    const id=order[idx++];
    window._testRemaining=order.length-idx; // games remaining after this one
    const g=GAMES.find(x=>x.id===id);
    _gen++;
    document.getElementById('gs-name').textContent=`Test · ${idx}/${order.length} · ${g.title}`;
    document.getElementById('gs-stats').innerHTML='';
    const p=document.getElementById('game-panel');
    p.innerHTML='';p.className='game-panel';
    g.start();
  };

  window._testSaveHook=function(id,v,label){
    testScores[id]={v,label:label||String(v)};
  };

  function showTestResults(){
    window._testAdvance=null;
    window._testSaveHook=null;
    window._testRemaining=null;
    _gen++;
    document.getElementById('gs-name').textContent='Full Test — Results';
    setStats('');
    const rows=TEST_IDS.map(id=>{
      const g=GAMES.find(x=>x.id===id);
      const ts=testScores[id];
      const best=getScoreLabel(id);
      const tsLabel=ts?ts.label:'—';
      const isNewBest=ts&&best&&ts.label===best;
      return`<tr>
        <td style="padding:10px 14px;font-weight:600">${g.icon} ${g.title}</td>
        <td style="padding:10px 14px;font-family:'DM Mono',monospace;font-size:.85rem">${tsLabel}</td>
        <td style="padding:10px 14px;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--muted)">${best||'—'}</td>
        <td style="padding:10px 14px;font-size:.82rem">${isNewBest?'<span style="color:var(--green);font-weight:700">★ New best</span>':''}</td>
      </tr>`;
    }).join('');
    setPanel(`<div style="width:100%;display:flex;flex-direction:column;gap:20px">
      <div style="text-align:center">
        <div style="font-family:'Instrument Serif',serif;font-size:2rem;margin-bottom:4px">Full Test Complete</div>
        <div style="font-family:'DM Mono',monospace;font-size:.8rem;color:var(--muted)">Your scores this run vs personal bests</div>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:.9rem">
        <thead><tr style="background:var(--surface2)">
          <th style="padding:8px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Game</th>
          <th style="padding:8px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">This run</th>
          <th style="padding:8px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">Personal best</th>
          <th style="padding:8px 14px"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="text-align:center;display:flex;gap:12px;justify-content:center">
        <button class="again-btn" onclick="startTest()">Run again</button>
        <button class="again-btn" style="background:var(--surface2);color:var(--text)" onclick="showDashboard()">Dashboard</button>
      </div>
    </div>`,true);
  }

  // Show intro
  _gen++;
  document.getElementById('dashboard').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('gs-name').textContent='Full Test';
  document.getElementById('gs-stats').innerHTML='';
  const p=document.getElementById('game-panel');
  p.innerHTML='';p.className='game-panel';
  setPanel(`<div class="start-card">
    <h3>Full Test</h3>
    <p>All 9 exercises back-to-back in a randomised order. A <strong>Next game →</strong> button replaces the usual "Play again" after each one. Scores update your personal bests automatically.</p>
    <p style="font-size:.85rem;color:var(--muted);margin-top:8px">Order: ${order.map(id=>GAMES.find(x=>x.id===id).title).join(' → ')}</p>
    <button class="big-btn" onclick="window._testAdvance&&window._testAdvance()">Begin</button>
  </div>`);
}

// ══════════════════════════════════════════════════════
//  GAME 9 · SKYSCRAPER — block rearrangement puzzle
// ══════════════════════════════════════════════════════
function startSkyscraper(){
  const g=myGen();
  function alive(){return myGen()===g;}

  // ── Block colours ────────────────────────────────
  const COLORS={
    red:    {bg:'#E84040',dark:'#C02020',label:'red'},
    green:  {bg:'#4CC94C',dark:'#2EA02E',label:'grn'},
    blue:   {bg:'#5B8EF0',dark:'#3060C0',label:'blu'},
    yellow: {bg:'#F5D34B',dark:'#C8A800',label:'yel'},
    pink:   {bg:'#F075C8',dark:'#C040A0',label:'pnk'},
    orange: {bg:'#F09040',dark:'#C06010',label:'org'},
    teal:   {bg:'#40C8C0',dark:'#209090',label:'tel'},
  };
  const COLOR_KEYS=Object.keys(COLORS);

  // ── Level config: [nBlocks, minOptimal] ──────────
  const LEVELS=[
    [4,5],[4,6],[4,7],      // levels 1-3: 4 blocks
    [5,7],[5,9],[5,11],     // levels 4-6: 5 blocks
    [6,10],[6,13],          // levels 7-8: 6 blocks
    [7,14],[7,16],          // levels 9-10: 7 blocks
  ];
  const TOTAL_LEVELS=10;

  // ── State ────────────────────────────────────────
  let levelIdx=0, piles, targetPiles, selected, moves, optimal, roundStart;
  let overPars=[], times=[], optimals=[], userMoves=[];

  // ── BFS ─────────────────────────────────────────
  function stateKey(p){return p.map(pile=>pile.join(',')).join('|');}
  function bfs(startP,tgtP){
    const goal=stateKey(tgtP);
    const start=startP.map(p=>[...p]);
    const startKey=stateKey(start);
    if(startKey===goal)return 0;
    const visited=new Map([[startKey,null]]);
    const queue=[start];
    let head=0;
    while(head<queue.length){
      const cur=queue[head++];
      const curKey=stateKey(cur);
      for(let i=0;i<3;i++){
        if(!cur[i].length)continue;
        const top=cur[i][cur[i].length-1];
        for(let j=0;j<3;j++){
          if(i===j)continue;
          const ns=cur.map(p=>[...p]);
          ns[i].pop();ns[j].push(top);
          const nk=stateKey(ns);
          if(visited.has(nk))continue;
          visited.set(nk,curKey);
          if(nk===goal){
            // count path length
            let depth=0,k=nk;
            while(visited.get(k)!==null){k=visited.get(k);depth++;}
            return depth;
          }
          queue.push(ns);
        }
      }
    }
    return -1;
  }

  // ── Puzzle generation ────────────────────────────
  function generateTarget(colors){
    const n=colors.length;
    const maxP=n<=3?1:n<=5?2:3;
    const nP=rand(1,maxP);
    const active=[...Array(3).keys()].sort(()=>Math.random()-.5).slice(0,nP);
    const shuffled=[...colors].sort(()=>Math.random()-.5);
    const tgt=[[],[],[]];
    active.forEach((a,i)=>tgt[a].push(shuffled[i]));
    shuffled.slice(nP).forEach(c=>tgt[active[Math.floor(Math.random()*nP)]].push(c));
    return tgt;
  }

  function generateStart(colors,tgtP){
    for(let attempt=0;attempt<200;attempt++){
      const shuffled=[...colors].sort(()=>Math.random()-.5);
      const nA=Math.random()<0.5?2:3;
      const active=[...Array(3).keys()].sort(()=>Math.random()-.5).slice(0,nA);
      const sp=[[],[],[]];
      shuffled.forEach((c,ci)=>sp[active[ci%nA]].push(c));
      if(active.some(a=>!sp[a].length))continue;
      if(stateKey(sp)===stateKey(tgtP))continue;
      return sp;
    }
    // fallback: all on pile 0
    return [colors,[], []];
  }

  function newLevel(){
    if(!alive())return;
    const [nBlocks,minOpt]=LEVELS[levelIdx];
    const colors=COLOR_KEYS.slice(0,nBlocks);

    let tgt,sp,opt;
    let attempts=0;
    do{
      attempts++;
      tgt=generateTarget(colors);
      sp=generateStart(colors,tgt);
      opt=bfs(sp,tgt);
    }while((opt<minOpt||opt<0)&&attempts<300);

    if(opt<0)opt=minOpt; // fallback

    piles=sp.map(p=>[...p]);
    targetPiles=tgt;
    optimal=opt;
    selected=null;
    moves=0;
    roundStart=performance.now();
    render();
    setStats(`<div class="stat-pill">Level <b>${levelIdx+1}/${TOTAL_LEVELS}</b></div><div class="stat-pill">Moves <b id="sky-mv">0</b></div>`);
  }

  // ── SVG block rendering ──────────────────────────
  function blockHTML(colorKey,mini=false,floating=false){
    const c=COLORS[colorKey];
    const cls='sky-block'+(mini?' mini':'')+(floating?' sky-floating':'');
    return`<div class="${cls}" style="background:${c.bg};border-bottom:3px solid ${c.dark};box-shadow:0 3px 8px rgba(0,0,0,.35)"></div>`;
  }

  function emptySlotHTML(mini=false){
    return`<div class="${mini?'sky-pile-slot mini':'sky-pile-slot'}"></div>`;
  }

  function renderPilesHTML(pilesArr,mini=false,selectedIdx=null){
    const maxH=Math.max(...pilesArr.map(p=>p.length),1);
    return pilesArr.map((pile,i)=>{
      const isSel=selectedIdx===i;
      const paddingSlots=maxH-pile.length;
      let inner='';
      for(let k=0;k<paddingSlots;k++)inner+=emptySlotHTML(mini);
      // Render bottom to top: array index 0=bottom, so render in reverse for top-of-stack first (CSS flex-column)
      for(let k=pile.length-1;k>=0;k--){
        const isTop=k===pile.length-1;
        const floating=isSel&&isTop&&!mini;
        inner+=blockHTML(pile[k],mini,floating);
      }
      inner+=`<div class="sky-base"></div>`;
      return`<div class="sky-pile-col${isSel?' sky-selected-pile':''}" data-pile="${i}" style="cursor:pointer">${inner}</div>`;
    }).join('');
  }

  function render(){
    if(!alive())return;
    const panel=document.getElementById('game-panel');
    if(!panel)return;

    // Use max possible blocks across all levels (7) so height never changes mid-game
    const MAX_BLOCKS=7;
    const gameH=60+MAX_BLOCKS*58;   // 7 blocks × 58px (block 52 + margin 6) + padding
    const tgtH=40+MAX_BLOCKS*42;    // mini blocks ~36+gap

    panel.className='game-panel wide top';
    panel.innerHTML=`<div class="sky-wrap">
      <div class="sky-target-label">Target pattern — level ${levelIdx+1} of ${TOTAL_LEVELS}</div>
      <div class="sky-target-area" style="min-height:${tgtH}px">
        <div class="sky-piles-row" style="min-height:${tgtH-20}px;align-items:flex-end">
          ${renderPilesHTML(targetPiles,true,null)}
        </div>
      </div>
      <div class="sky-game-area" id="sky-game" style="min-height:${gameH}px">
        <div class="sky-piles-row" style="height:${gameH-50}px;align-items:flex-end" id="sky-piles">
          ${renderPilesHTML(piles,false,selected)}
        </div>
        <div class="sky-info-row">
          <div class="sky-move-count">Moves: <span id="sky-mv2">${moves}</span></div>
          <div class="sky-status" id="sky-status">${selected===null?'Click a pile to pick up':'Click destination pile'}</div>
        </div>
      </div>
    </div>`;

    // Use event delegation — click anywhere in sky-game delegates to nearest pile col
    const gameDiv=document.getElementById('sky-game');
    if(gameDiv){
      gameDiv.addEventListener('click',(e)=>{
        // Walk up to find a data-pile element
        let el=e.target;
        while(el&&el!==gameDiv){
          if(el.dataset&&el.dataset.pile!==undefined){
            onPileClick(parseInt(el.dataset.pile));
            return;
          }
          el=el.parentElement;
        }
      });
    }
  }

  function onPileClick(i){
    if(!alive())return;
    if(selected===null){
      if(piles[i].length===0){showStatus('That pile is empty!');return;}
      selected=i;
      render();
    } else {
      if(i===selected){
        selected=null;
        render();
      } else {
        const block=piles[selected].pop();
        piles[i].push(block);
        moves++;
        selected=null;
        const mv=document.getElementById('sky-mv');
        if(mv)mv.textContent=moves;
        // Render the new state first, then check for win (overlay appended after)
        render();
        if(!alive())return;
        checkWin();
      }
    }
  }

  function showStatus(msg){
    const el=document.getElementById('sky-status');
    if(el)el.textContent=msg;
  }

  function checkWin(){
    if(stateKey(piles)!==stateKey(targetPiles))return false;
    const elapsed=(performance.now()-roundStart)/1000;
    const overPar=moves-optimal;
    overPars.push(overPar);
    times.push(elapsed);
    optimals.push(optimal);
    userMoves.push(moves);

    if(levelIdx+1>=TOTAL_LEVELS){endGame();return true;}

    // Show win overlay — render() was already called, so sky-game exists
    const gameArea=document.getElementById('sky-game');
    if(!gameArea)return true;
    const ov=document.createElement('div');
    ov.className='sky-win-overlay';
    ov.innerHTML=`
      <div class="sky-win-title">Level ${levelIdx+1} solved!</div>
      <div class="sky-win-hint">Click anywhere to continue to level ${levelIdx+2}</div>`;
    ov.addEventListener('click',()=>{
      if(!alive())return;
      levelIdx++;
      newLevel();
    });
    gameArea.appendChild(ov);
    return true;
  }

  function endGame(){
    if(!alive())return;
    const avgOver=(overPars.reduce((a,b)=>a+b,0)/overPars.length);
    const avgTime=(times.reduce((a,b)=>a+b,0)/times.length);
    const label=`${avgOver.toFixed(2)} over par @ ${avgTime.toFixed(1)}s`;
    saveScore('skyscraper',avgOver,label);
    setStats('');

    // Build per-level table columns
    const levelHeaders=Array.from({length:TOTAL_LEVELS},(_,i)=>`<th style="padding:6px 10px;text-align:center;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);min-width:52px">L${i+1}</th>`).join('');
    const optRow=optimals.map(v=>`<td style="padding:6px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text2)">${v}</td>`).join('');
    const movRow=userMoves.map(v=>`<td style="padding:6px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text)">${v}</td>`).join('');
    const parRow=overPars.map(v=>{
      const col=v===0?'var(--green)':v<=2?'var(--yellow)':'var(--red)';
      return`<td style="padding:6px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:.82rem;font-weight:700;color:${col}">${v===0?'+0':'+'+v}</td>`;
    }).join('');

    setPanel(`<div style="width:100%;display:flex;flex-direction:column;gap:20px;align-items:center">
      <div class="result-card" style="width:100%">
        <h3>Skyscraper complete</h3>
        <div class="result-num">${avgOver.toFixed(2)}<span style="font-size:2rem;color:var(--muted)"> over par</span></div>
        <div class="result-sub">Avg extra moves per level · Avg solve time: ${avgTime.toFixed(1)}s</div>
      </div>
      <div style="width:100%;overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:.88rem">
          <thead><tr style="background:var(--surface2)">
            <th style="padding:6px 14px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap">Level</th>
            ${levelHeaders}
          </tr></thead>
          <tbody>
            <tr style="border-top:1px solid var(--border)">
              <td style="padding:6px 14px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap">Optimal</td>
              ${optRow}
            </tr>
            <tr style="border-top:1px solid var(--border)">
              <td style="padding:6px 14px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap">Your moves</td>
              ${movRow}
            </tr>
            <tr style="border-top:1px solid var(--border);background:var(--surface2)">
              <td style="padding:6px 14px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap">Par</td>
              ${parRow}
            </tr>
          </tbody>
        </table>
      </div>
      <button class="again-btn" onclick="startSkyscraper()">Play again</button>
    </div>`,true);
  }

  // ── Start screen ─────────────────────────────────
  setStats('');
  setPanel(`<div class="start-card">
    <h3>Skyscraper</h3>
    <p>Rearrange coloured blocks across three piles to match the target pattern shown above the game area. Click a pile to pick up its top block, then click another pile to place it. 10 levels, 4 to 7 blocks — score is average moves over the optimal solution.</p>
    <button class="big-btn" onclick="skyGo()">Begin</button>
  </div>`);
  window.skyGo=()=>{if(!alive())return;levelIdx=0;overPars=[];times=[];optimals=[];userMoves=[];newLevel();};
}

// ── init ──
renderDashboard();
</script>
</body>
</html>
