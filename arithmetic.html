<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arithmetic — Mental Edge</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── ARITHMETIC DASHBOARD ── */
.arith-dash-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.arith-dash-logo { font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: var(--text); }
.arith-dash-logo span { color: var(--accent); font-style: italic; }

/* ── SHARED QUESTION DISPLAY ── */
.arith-wrap {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.arith-nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 20px;
}
.arith-q-counter {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
}
.arith-timer {
  font-family: 'DM Mono', monospace;
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
  min-width: 54px;
  text-align: right;
  transition: color .2s;
}
.arith-timer.warn { color: var(--red); }

.arith-question {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  text-align: center;
  color: var(--text);
  margin-bottom: 28px;
  line-height: 1.4;
}
.arith-question-label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  text-align: center;
}

/* ── MULTIPLE CHOICE ── */
.arith-choices {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 0;
}
.arith-choice {
  padding: 12px 6px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Mono', monospace;
  font-size: .92rem;
  color: var(--text);
  cursor: pointer;
  transition: border-color .12s, background .12s, color .12s;
  text-align: center;
  font-weight: 500;
}
.arith-choice:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}
.arith-choice.correct {
  border-color: var(--green) !important;
  background: var(--green-light) !important;
  color: var(--green) !important;
  font-weight: 700;
}
.arith-choice.wrong {
  border-color: var(--red) !important;
  background: var(--red-light) !important;
  color: var(--red) !important;
  font-weight: 700;
}
.arith-choice.reveal-correct {
  border-color: var(--green) !important;
  background: var(--green-light) !important;
  color: var(--green) !important;
  font-weight: 700;
}
.arith-choice:disabled { cursor: default; }

/* ── FREE RESPONSE ── */
.arith-input-wrap {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 0;
}
.arith-input {
  flex: 1;
  padding: 14px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 1.3rem;
  color: var(--text);
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color .15s;
  text-align: center;
}
.arith-input:focus { border-color: var(--accent); }
.arith-input.correct { border-color: var(--green); background: var(--green-light); color: var(--green); }
.arith-input.wrong   { border-color: var(--red);   background: var(--red-light);   color: var(--red);   }
.arith-input:disabled { cursor: default; }

.arith-submit-btn {
  padding: 14px 22px;
  background: var(--text);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: .88rem;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.arith-submit-btn:hover { background: #111; }
.arith-submit-btn:disabled { opacity: .4; cursor: default; }

.arith-feedback {
  margin-top: 16px;
  padding: 13px 16px;
  background: linear-gradient(135deg, #f0f4ff 0%, #f8f6ff 100%);
  border: 1px solid #d0d8f8;
  border-radius: 10px;
  font-size: .84rem;
  color: var(--text2);
  line-height: 1.6;
  animation: fadeSlideIn .25s ease forwards;
}
.arith-feedback strong { color: var(--accent); font-weight: 600; }
.arith-feedback.correct-fb { background: var(--green-light); border-color: var(--green); }
.arith-feedback.wrong-fb   { background: var(--red-light);   border-color: var(--red);   }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.arith-next-btn {
  margin-top: 12px;
  width: 100%;
  padding: 13px;
  background: var(--text);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: .88rem;
  cursor: pointer;
  transition: background .15s;
  animation: fadeSlideIn .3s ease .05s both;
}
.arith-next-btn:hover { background: #111; }

/* ── PROGRESS BAR ── */
.arith-prog-wrap {
  margin-bottom: 18px;
}
.arith-prog-track {
  width: 100%; height: 3px;
  background: var(--border);
  border-radius: 2px;
}
.arith-prog-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .3s ease;
}

/* ── REVIEW (shared with test results) ── */
.arith-review-header {
  text-align: center;
  margin-bottom: 20px;
}
.arith-score-big {
  font-family: 'Instrument Serif', serif;
  font-size: 3.5rem;
  line-height: 1;
  color: var(--text);
  margin-bottom: 4px;
}
.arith-score-sub {
  font-size: .78rem;
  color: var(--text2);
  margin-bottom: 14px;
}
.arith-score-pills {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.arith-score-pill {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
}
.arith-score-pill.green { background: var(--green-light); border-color: var(--green); color: var(--green); }
.arith-score-pill.red   { background: var(--red-light);   border-color: var(--red);   color: var(--red);   }
.arith-score-pill.best  { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

.arith-review-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 14px 0 10px;
  gap: 8px;
}
.arith-review-q-label {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
  text-align: center;
  flex: 1;
}
.arith-review-arrow {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
}
.arith-review-arrow:hover { background: var(--surface2); border-color: var(--border2); }
.arith-review-arrow:disabled { opacity: .3; cursor: default; }

.arith-q-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 14px;
  justify-content: center;
}
.arith-q-dot {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.arith-q-dot.active   { background: var(--accent); border-color: var(--accent); color: #fff; }
.arith-q-dot.dot-correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
.arith-q-dot.dot-wrong   { background: var(--red-light);   border-color: var(--red);   color: var(--red);   }
.arith-q-dot.dot-skip    { border-style: dashed; color: var(--muted); }

/* Correct answer shown in review for FR */
.arith-correct-reveal {
  margin-top: 8px;
  font-size: .84rem;
  color: var(--green);
  font-weight: 600;
  text-align: center;
}
</style>
</head>
<body>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <header class="arith-dash-header">
    <div style="display:flex;align-items:center;gap:16px">
      <a class="back-btn" href="index.html" style="border-color:transparent">&#8592; Home</a>
      <div class="arith-dash-logo">Arithmetic</div>
    </div>
    <div class="dash-sub">Assessment Suite</div>
  </header>
  <div class="dash-body">
    <div class="dash-intro">
      <h2>Select an exercise</h2>
      <p>Fast-paced arithmetic drills — addition, subtraction, multiplication, and division, with integers, fractions, and decimals. 80 questions in 8 minutes.</p>
    </div>
    <div class="games-grid" id="arith-games-grid"></div>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="game-screen" style="display:none">
  <header class="game-header">
    <button class="back-btn" onclick="showDashboard()">&#8592; Arithmetic</button>
    <div class="game-name-bar" id="gs-name"></div>
    <div class="stat-strip" id="gs-stats"></div>
  </header>
  <div class="game-wrap">
    <div class="game-panel" id="game-panel"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  ARITHMETIC — GAME REGISTRY
// ══════════════════════════════════════════════════════
const ARITH_GAMES = [
  {
    id: 'arith-mc',
    title: '80 in 8 — Multiple Choice',
    icon: '◉',
    tag: 'Arithmetic',
    desc: '80 arithmetic questions in 8 minutes. Four answer choices per question — one correct. Mix of addition, subtraction, multiplication, division, fractions, and decimals.',
    meta: ['80 Qs', '8 min', 'Multiple Choice'],
    start: startArithMC
  },
  {
    id: 'arith-fr',
    title: '80 in 8 — Free Response',
    icon: '✎',
    tag: 'Arithmetic',
    desc: '80 arithmetic questions in 8 minutes. Type your answer — fractions (1/2) and decimals (0.5) are both accepted. Press Enter to submit each answer.',
    meta: ['80 Qs', '8 min', 'Free Response'],
    start: startArithFR
  }
];

// ── score storage ──
let arithScores = {};
try {
  const raw = JSON.parse(localStorage.getItem('me_arith_scores') || '{}');
  Object.keys(raw).forEach(k => {
    const v = raw[k];
    if (v != null && typeof v === 'object' && typeof v.label === 'string') arithScores[k] = v;
  });
} catch(e) {}

function saveArithScore(id, v, label) {
  const entry = {v, label: label || String(v)};
  const cur = arithScores[id];
  if (cur == null || v > cur.v) {
    arithScores[id] = entry;
    try { localStorage.setItem('me_arith_scores', JSON.stringify(arithScores)); } catch(e) {}
  }
}
function getArithScoreLabel(id) {
  const s = arithScores[id]; return (s && s.label) ? s.label : null;
}

// ── gen guard ──
let _gen = 0;
function myGen() { return _gen; }

// ── navigation ──
function showDashboard() {
  _gen++;
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('game-screen').style.display = 'none';
  renderDashboard();
}
function launchGame(id) {
  _gen++;
  const g = ARITH_GAMES.find(x => x.id === id);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('gs-name').textContent = g.title;
  document.getElementById('gs-stats').innerHTML = '';
  const p = document.getElementById('game-panel');
  p.innerHTML = ''; p.className = 'game-panel';
  g.start();
}
function renderDashboard() {
  document.getElementById('arith-games-grid').innerHTML = ARITH_GAMES.map(g => `
    <div class="game-card" onclick="launchGame('${g.id}')">
      <div class="card-tag">${g.tag}</div>
      <div class="card-icon-row">${g.icon}</div>
      <div class="card-title">${g.title}</div>
      <div class="card-desc">${g.desc}</div>
      <div class="card-meta">
        ${g.meta.map(m => `<span class="chip">${m}</span>`).join('')}
        ${getArithScoreLabel(g.id) != null ? `<span class="chip hi">Best: ${getArithScoreLabel(g.id)}</span>` : ''}
      </div>
      <button class="play-btn">Start exercise →</button>
    </div>`).join('');
}

function setStats(html) { document.getElementById('gs-stats').innerHTML = html; }
function setPanel(html, top) {
  const p = document.getElementById('game-panel');
  p.className = 'game-panel' + (top ? ' top' : '');
  p.innerHTML = html;
}
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randChoice(arr) { return arr[rand(0, arr.length - 1)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rand(0, i); [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════════════════
//  QUESTION GENERATOR
// ══════════════════════════════════════════════════════

// All questions return:
// { question: string, answer: Fraction, explanation: string, type: string }
// Fraction = { n: number, d: number } — always in lowest terms, d >= 1
// displayAnswer() for showing, equals(userInput) for checking

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while(b) { [a,b]=[b,a%b]; } return a||1; }
function makeFrac(n, d) {
  if (d === 0) return {n:0,d:1};
  if (d < 0) { n=-n; d=-d; }
  const g = gcd(Math.abs(n), d);
  return { n: n/g, d: d/g };
}
function fracDisplay(f) {
  if (f.d === 1) return String(f.n);
  // Show as decimal if it terminates and is short enough
  const dec = f.n / f.d;
  const decStr = String(parseFloat(dec.toPrecision(6)));
  if (decStr.length <= 6 && !decStr.includes('e')) return decStr;
  return `${f.n}/${f.d}`;
}
function fracAdd(a, b) { return makeFrac(a.n*b.d + b.n*a.d, a.d*b.d); }
function fracSub(a, b) { return makeFrac(a.n*b.d - b.n*a.d, a.d*b.d); }
function fracMul(a, b) { return makeFrac(a.n*b.n, a.d*b.d); }
function fracDiv(a, b) { return makeFrac(a.n*b.d, a.d*b.n); }
function intFrac(n) { return {n, d:1}; }

// Parse user input to a Fraction (or null if invalid)
function parseInput(s) {
  s = s.trim().replace(/\s+/g,'');
  if (!s) return null;
  if (s.includes('/')) {
    const parts = s.split('/');
    if (parts.length !== 2) return null;
    const n = parseInt(parts[0]), d = parseInt(parts[1]);
    if (isNaN(n) || isNaN(d) || d === 0) return null;
    return makeFrac(n, d);
  }
  const v = parseFloat(s);
  if (isNaN(v)) return null;
  // Convert decimal to fraction
  const decStr = String(v);
  const dp = (decStr.split('.')[1] || '').length;
  const denom = Math.pow(10, dp);
  return makeFrac(Math.round(v * denom), denom);
}
function fracEqual(a, b) {
  if (!a || !b) return false;
  return a.n * b.d === b.n * a.d;
}

// Difficulty tiers: 0=easy, 1=medium, 2=hard
// 80 questions: 20 easy, 35 medium, 25 hard
const TIER_COUNTS = [20, 35, 25];

// ── Question type generators ──

function qAddInt(tier) {
  // tier 0: single digit + single digit
  // tier 1: 2-digit + 2-digit
  // tier 2: 3-digit + 3-digit or multi-term
  let a, b, c;
  if (tier === 0) { a = rand(2,9); b = rand(2,9); }
  else if (tier === 1) { a = rand(12,99); b = rand(12,99); }
  else { a = rand(100,999); b = rand(100,999); c = rand(10,99); }
  const ans = tier === 2
    ? makeFrac(a+b+c, 1)
    : makeFrac(a+b, 1);
  const q = tier === 2 ? `${a} + ${b} + ${c}` : `${a} + ${b}`;
  return { question: q, answer: ans, type: 'add', explanation: `${q} = <strong>${a+b+(c||0)}</strong>` };
}

function qSubInt(tier) {
  let a, b;
  if (tier === 0) { a = rand(5,15); b = rand(1,a); }
  else if (tier === 1) { a = rand(20,150); b = rand(10,a); }
  else { a = rand(200,999); b = rand(100,a); }
  return {
    question: `${a} − ${b}`,
    answer: makeFrac(a-b, 1),
    type: 'sub',
    explanation: `${a} − ${b} = <strong>${a-b}</strong>`
  };
}

function qMulInt(tier) {
  let a, b;
  if (tier === 0) { a = rand(2,9); b = rand(2,9); }
  else if (tier === 1) { a = rand(2,15); b = rand(11,25); }
  else { a = rand(12,35); b = rand(12,35); }
  return {
    question: `${a} × ${b}`,
    answer: makeFrac(a*b, 1),
    type: 'mul',
    explanation: `${a} × ${b} = <strong>${a*b}</strong>`
  };
}

function qDivInt(tier) {
  // Generate so it divides evenly
  if (tier === 0) {
    const b = rand(2,9); const ans = rand(2,9);
    return { question: `${b*ans} ÷ ${b}`, answer: makeFrac(ans,1), type:'div',
      explanation: `${b*ans} ÷ ${b} = <strong>${ans}</strong>` };
  } else if (tier === 1) {
    const b = rand(2,15); const ans = rand(5,20);
    return { question: `${b*ans} ÷ ${b}`, answer: makeFrac(ans,1), type:'div',
      explanation: `${b*ans} ÷ ${b} = <strong>${ans}</strong>` };
  } else {
    const b = rand(7,25); const ans = rand(10,40);
    return { question: `${b*ans} ÷ ${b}`, answer: makeFrac(ans,1), type:'div',
      explanation: `${b*ans} ÷ ${b} = <strong>${ans}</strong>` };
  }
}

function qFracAdd(tier) {
  // tier 0: same denominator, small
  // tier 1: different denominators (LCM-friendly)
  // tier 2: mixed numbers or 3 fracs
  if (tier === 0) {
    const d = randChoice([4,5,6,8,10]);
    const n1 = rand(1,d-1), n2 = rand(1,d-1);
    const a = makeFrac(n1,d), b = makeFrac(n2,d);
    const ans = fracAdd(a,b);
    return { question: `${n1}/${d} + ${n2}/${d}`, answer: ans, type:'fracadd',
      explanation: `${n1}/${d} + ${n2}/${d} = ${n1+n2}/${d} = <strong>${fracDisplay(ans)}</strong>` };
  } else if (tier === 1) {
    const pairs = [[2,3],[2,5],[3,4],[4,5],[3,5],[2,7],[4,6],[3,8]];
    const [d1,d2] = randChoice(pairs);
    const n1 = rand(1,d1), n2 = rand(1,d2);
    const a = makeFrac(n1,d1), b = makeFrac(n2,d2);
    const ans = fracAdd(a,b);
    return { question: `${n1}/${d1} + ${n2}/${d2}`, answer: ans, type:'fracadd',
      explanation: `Find common denominator: <strong>${fracDisplay(ans)}</strong>` };
  } else {
    // mixed + fraction
    const whole = rand(1,5);
    const d = randChoice([3,4,5,6,8]);
    const n1 = rand(1,d-1), n2 = rand(1,d-1);
    const a = makeFrac(whole*d+n1,d), b = makeFrac(n2,d);
    const ans = fracAdd(a,b);
    return { question: `${whole} ${n1}/${d} + ${n2}/${d}`, answer: ans, type:'fracadd',
      explanation: `${whole} ${n1}/${d} + ${n2}/${d} = <strong>${fracDisplay(ans)}</strong>` };
  }
}

function qFracSub(tier) {
  if (tier === 0) {
    const d = randChoice([4,5,6,8,10]);
    let n1 = rand(2,d), n2 = rand(1,n1-1);
    const a = makeFrac(n1,d), b = makeFrac(n2,d);
    const ans = fracSub(a,b);
    return { question: `${n1}/${d} − ${n2}/${d}`, answer: ans, type:'fracsub',
      explanation: `${n1}/${d} − ${n2}/${d} = ${n1-n2}/${d} = <strong>${fracDisplay(ans)}</strong>` };
  } else if (tier === 1) {
    const pairs = [[3,4],[2,3],[4,5],[3,5],[2,5],[5,6],[3,8],[4,7]];
    const [d1,d2] = randChoice(pairs);
    const n1 = rand(2,d1), n2 = rand(1,d2-1);
    const a = makeFrac(n1,d1), b = makeFrac(n2,d2);
    const ans = fracSub(a,b);
    if (ans.n <= 0) return qFracSub(tier);
    return { question: `${n1}/${d1} − ${n2}/${d2}`, answer: ans, type:'fracsub',
      explanation: `Common denominator: <strong>${fracDisplay(ans)}</strong>` };
  } else {
    const whole = rand(2,6), d = randChoice([3,4,5,6,8]);
    const n1 = rand(1,d-1), n2 = rand(n1+1,d);
    // whole n1/d - n2/d requires borrowing
    const a = makeFrac(whole*d+n1,d), b = makeFrac(n2,d);
    const ans = fracSub(a,b);
    return { question: `${whole} ${n1}/${d} − ${n2}/${d}`, answer: ans, type:'fracsub',
      explanation: `Borrow from ${whole}: <strong>${fracDisplay(ans)}</strong>` };
  }
}

function qFracMul(tier) {
  if (tier === 0) {
    const d1 = randChoice([2,3,4,5]), d2 = randChoice([2,3,4,5]);
    const n1 = rand(1,d1), n2 = rand(1,d2);
    const a = makeFrac(n1,d1), b = makeFrac(n2,d2);
    const ans = fracMul(a,b);
    return { question: `${n1}/${d1} × ${n2}/${d2}`, answer: ans, type:'fracmul',
      explanation: `${n1}×${n2} / ${d1}×${d2} = <strong>${fracDisplay(ans)}</strong>` };
  } else if (tier === 1) {
    const d = randChoice([3,4,5,6,8]);
    const n = rand(1,d-1), whole = rand(2,8);
    const a = makeFrac(n,d), b = intFrac(whole);
    const ans = fracMul(a,b);
    return { question: `${n}/${d} × ${whole}`, answer: ans, type:'fracmul',
      explanation: `${n}/${d} × ${whole} = ${n*whole}/${d} = <strong>${fracDisplay(ans)}</strong>` };
  } else {
    // mixed × fraction
    const whole = rand(1,4), d1 = randChoice([3,4,5]), d2 = randChoice([2,3,4]);
    const n1 = rand(1,d1-1), n2 = rand(1,d2);
    const a = makeFrac(whole*d1+n1,d1), b = makeFrac(n2,d2);
    const ans = fracMul(a,b);
    return { question: `${whole} ${n1}/${d1} × ${n2}/${d2}`, answer: ans, type:'fracmul',
      explanation: `Convert: ${whole*d1+n1}/${d1} × ${n2}/${d2} = <strong>${fracDisplay(ans)}</strong>` };
  }
}

function qFracDiv(tier) {
  if (tier === 0) {
    const d1 = randChoice([2,3,4,5]), d2 = randChoice([2,3,4,5]);
    const n1 = rand(1,d1), n2 = rand(1,d2);
    const a = makeFrac(n1,d1), b = makeFrac(n2,d2);
    const ans = fracDiv(a,b);
    return { question: `${n1}/${d1} ÷ ${n2}/${d2}`, answer: ans, type:'fracdiv',
      explanation: `Multiply by reciprocal: ${n1}/${d1} × ${d2}/${n2} = <strong>${fracDisplay(ans)}</strong>` };
  } else if (tier === 1) {
    const d = randChoice([3,4,5,6,8]);
    const n = rand(1,d-1), whole = rand(2,6);
    const a = makeFrac(n,d), b = intFrac(whole);
    const ans = fracDiv(a,b);
    return { question: `${n}/${d} ÷ ${whole}`, answer: ans, type:'fracdiv',
      explanation: `${n}/${d} ÷ ${whole} = ${n}/${d*whole} = <strong>${fracDisplay(ans)}</strong>` };
  } else {
    const whole = rand(2,5), d1 = randChoice([3,4,5]), d2 = randChoice([2,3,4]);
    const n1 = rand(1,d1-1), n2 = rand(1,d2);
    const a = makeFrac(whole*d1+n1,d1), b = makeFrac(n2,d2);
    const ans = fracDiv(a,b);
    return { question: `${whole} ${n1}/${d1} ÷ ${n2}/${d2}`, answer: ans, type:'fracdiv',
      explanation: `Convert & flip: ${whole*d1+n1}/${d1} × ${d2}/${n2} = <strong>${fracDisplay(ans)}</strong>` };
  }
}

function qDecAdd(tier) {
  if (tier === 0) {
    const a = rand(1,9) + rand(0,9)*0.1, b = rand(1,9) + rand(0,9)*0.1;
    const ans = makeFrac(Math.round((a+b)*10), 10);
    return { question: `${a.toFixed(1)} + ${b.toFixed(1)}`, answer: ans, type:'decadd',
      explanation: `= <strong>${fracDisplay(ans)}</strong>` };
  } else if (tier === 1) {
    const a = rand(1,20) + rand(0,99)*0.01, b = rand(1,20) + rand(0,99)*0.01;
    const ans = makeFrac(Math.round((a+b)*100), 100);
    return { question: `${a.toFixed(2)} + ${b.toFixed(2)}`, answer: ans, type:'decadd',
      explanation: `= <strong>${fracDisplay(ans)}</strong>` };
  } else {
    const a = (rand(1,5) + rand(0,999)*0.001).toFixed(3);
    const b = (rand(1,5) + rand(0,999)*0.001).toFixed(3);
    const ans = makeFrac(Math.round((parseFloat(a)+parseFloat(b))*1000), 1000);
    return { question: `${a} + ${b}`, answer: ans, type:'decadd',
      explanation: `= <strong>${fracDisplay(ans)}</strong>` };
  }
}

function qDecMul(tier) {
  if (tier === 0) {
    const a = rand(1,9) + rand(1,9)*0.1, b = rand(2,9);
    const ans = makeFrac(Math.round(a*b*10), 10);
    return { question: `${a.toFixed(1)} × ${b}`, answer: ans, type:'decmul',
      explanation: `= <strong>${fracDisplay(ans)}</strong>` };
  } else if (tier === 1) {
    const a = rand(1,9) + rand(1,9)*0.1, b = rand(1,9) + rand(1,9)*0.1;
    const ans = makeFrac(Math.round(a*b*100), 100);
    return { question: `${a.toFixed(1)} × ${b.toFixed(1)}`, answer: ans, type:'decmul',
      explanation: `= <strong>${fracDisplay(ans)}</strong>` };
  } else {
    const a = rand(1,5) + rand(1,9)*0.01, b = rand(1,5) + rand(1,9)*0.01;
    const ans = makeFrac(Math.round(a*b*10000), 10000);
    return { question: `${a.toFixed(2)} × ${b.toFixed(2)}`, answer: ans, type:'decmul',
      explanation: `= <strong>${fracDisplay(ans)}</strong>` };
  }
}

function qPercentage(tier) {
  // X% of Y
  const percents = tier === 0 ? [10,20,25,50,75] : tier === 1 ? [15,30,35,40,60,70,80] : [12,17,33,45,65,85];
  const p = randChoice(percents);
  const y = tier === 0 ? rand(2,10)*10 : tier === 1 ? rand(2,20)*10 : rand(5,40)*10;
  const val = p * y / 100;
  const ans = makeFrac(Math.round(val * 100), 100);
  return {
    question: `${p}% of ${y}`, answer: ans, type: 'percent',
    explanation: `${p}/100 × ${y} = <strong>${fracDisplay(ans)}</strong>`
  };
}

function qMixedOps(tier) {
  // Simple BODMAS expressions
  if (tier === 1) {
    const a = rand(2,8), b = rand(2,6), c = rand(1,9);
    // a × b + c
    const ans = makeFrac(a*b+c, 1);
    return { question: `${a} × ${b} + ${c}`, answer: ans, type:'mixed',
      explanation: `${a}×${b} = ${a*b}, + ${c} = <strong>${a*b+c}</strong>` };
  } else {
    const a = rand(2,8), b = rand(2,6), c = rand(2,5), d = rand(1,9);
    // a × b − c × d
    const ans = makeFrac(a*b - c*d, 1);
    if (ans.n < 0) return qMixedOps(tier);
    return { question: `${a} × ${b} − ${c} × ${d}`, answer: ans, type:'mixed',
      explanation: `${a*b} − ${c*d} = <strong>${a*b-c*d}</strong>` };
  }
}

function qSquare(tier) {
  const n = tier === 0 ? rand(2,12) : tier === 1 ? rand(11,20) : rand(15,30);
  return {
    question: `${n}²`,
    answer: makeFrac(n*n, 1),
    type: 'square',
    explanation: `${n}² = <strong>${n*n}</strong>`
  };
}

// Generate all 80 questions with tier distribution
function generateAllQuestions() {
  const pools = [
    // [generator, weight] for each tier
    [
      // Easy
      [() => qAddInt(0), 3], [() => qSubInt(0), 3], [() => qMulInt(0), 3],
      [() => qDivInt(0), 2], [() => qFracAdd(0), 2], [() => qFracSub(0), 2],
      [() => qFracMul(0), 2], [() => qDecAdd(0), 1], [() => qSquare(0), 2]
    ],
    [
      // Medium
      [() => qAddInt(1), 2], [() => qSubInt(1), 2], [() => qMulInt(1), 3],
      [() => qDivInt(1), 2], [() => qFracAdd(1), 3], [() => qFracSub(1), 3],
      [() => qFracMul(1), 3], [() => qFracDiv(1), 2], [() => qDecAdd(1), 2],
      [() => qDecMul(0), 2], [() => qPercentage(0), 2], [() => qMixedOps(1), 3],
      [() => qSquare(1), 2]
    ],
    [
      // Hard
      [() => qAddInt(2), 2], [() => qMulInt(2), 3], [() => qFracAdd(2), 2],
      [() => qFracSub(2), 2], [() => qFracMul(2), 3], [() => qFracDiv(2), 3],
      [() => qDecMul(1), 2], [() => qDecMul(2), 2], [() => qPercentage(1), 2],
      [() => qPercentage(2), 2], [() => qMixedOps(2), 3], [() => qSquare(2), 2]
    ]
  ];

  // Build weighted pools
  function buildWeighted(pool) {
    const arr = [];
    for (const [fn, w] of pool) for (let i = 0; i < w; i++) arr.push(fn);
    return arr;
  }

  const questions = [];
  const tierCounts = [20, 35, 25];
  for (let tier = 0; tier < 3; tier++) {
    const weighted = buildWeighted(pools[tier]);
    for (let i = 0; i < tierCounts[tier]; i++) {
      let q = null;
      for (let attempt = 0; attempt < 20; attempt++) {
        try {
          q = randChoice(weighted)();
          if (q && q.answer && isFinite(q.answer.n/q.answer.d)) break;
        } catch(e) { q = null; }
      }
      questions.push(q || { question:'1 + 1', answer:makeFrac(2,1), type:'add', explanation:'1+1=<strong>2</strong>' });
    }
  }
  return shuffle(questions);
}

// ── DISTRACTOR GENERATION ──
// Generate 4 wrong answers that are plausible but wrong
function makeArithDistractors(q) {
  const correct = q.answer;
  const correctStr = answerDisplay(correct);
  const wrong = new Set([correctStr]);
  const candidates = [];

  const { n, d } = correct;
  const val = n / d;
  const isInt = d === 1;
  const isFrac = d > 1 && Math.abs(n) < 100 && d < 100;

  if (isInt) {
    // For multiplication: common errors are off-by-one factor, transposition, etc.
    const deltas = shuffle([1,-1,2,-2,3,-3,5,-5,10,-10,
      Math.round(val*0.1), -Math.round(val*0.1),
      Math.round(val*0.05), Math.round(val*0.2)]);
    for (const d of deltas) {
      const v = n + d;
      if (v !== n && v >= 0) candidates.push(makeFrac(v,1));
      if (candidates.length >= 12) break;
    }
    // Also add numbers with same last digit (common confusion)
    const lastDigit = Math.abs(n) % 10;
    for (let offset = -30; offset <= 30; offset += 10) {
      const v = n + offset;
      if (v !== n && v >= 0 && Math.abs(v - n) <= 50) candidates.push(makeFrac(v,1));
    }
  } else if (isFrac) {
    // Nearby fractions: adjust n or d by ±1
    for (const dn of [-2,-1,1,2,3,-3]) {
      for (const dd of [-2,-1,0,1,2]) {
        const nn = n+dn, nd = d+dd;
        if (nd > 0 && nn > 0 && !(nn===n && nd===d)) candidates.push(makeFrac(nn,nd));
      }
    }
    // Also try: wrong operation result (e.g. user added denoms instead of finding LCD)
    if (q.type === 'fracadd' || q.type === 'fracsub') {
      // Common mistake: add/sub numerators and denominators separately
      const parts = q.question.match(/(\d+)\/(\d+)/g);
      if (parts && parts.length >= 2) {
        const [n1,d1] = parts[0].split('/').map(Number);
        const [n2,d2] = parts[1].split('/').map(Number);
        if (q.type === 'fracadd') candidates.push(makeFrac(n1+n2, d1+d2));
        else candidates.push(makeFrac(Math.abs(n1-n2), d1+d2));
      }
    }
  }

  // Shuffle and pick 4 distinct wrong answers
  shuffle(candidates);
  for (const c of candidates) {
    if (wrong.size >= 4) break;
    const s = answerDisplay(c);
    if (!wrong.has(s) && c.n >= 0) { wrong.add(s); }
  }

  // Fallback
  let extra = 1;
  while (wrong.size < 4) {
    const f = makeFrac(n + extra*(isInt?3:1), d);
    wrong.add(answerDisplay(f));
    extra++;
  }

  const arr = Array.from(wrong);
  shuffle(arr);
  return arr;
}

function answerDisplay(f) {
  if (!f) return '?';
  if (f.d === 1) return String(f.n);
  // Prefer simple decimal if it terminates cleanly within 4 dp
  const dec = f.n / f.d;
  const decStr = parseFloat(dec.toPrecision(5)).toString();
  // Only show as decimal if short enough
  if (!decStr.includes('e') && decStr.length <= 7) return decStr;
  return `${f.n}/${f.d}`;
}

// ══════════════════════════════════════════════════════
//  SHARED TEST ENGINE
// ══════════════════════════════════════════════════════
const TOTAL_Q = 80;
const TIME_LIMIT = 8 * 60; // seconds

function runTest(gameId, isMultipleChoice) {
  const g = myGen();
  function alive() { return myGen() === g; }

  const questions = generateAllQuestions();
  // For MC, pre-generate choices
  const allChoices = isMultipleChoice
    ? questions.map(q => makeArithDistractors(q))
    : null;

  let currentIdx = 0;
  let timeLeft = TIME_LIMIT;
  let timerInterval = null;
  let submitted = false;
  let reviewIdx = 0;

  // answers[i] = { raw: string (user typed or choice), parsed: Fraction|null } or null
  const answers = new Array(TOTAL_Q).fill(null);

  function startTimer() {
    timerInterval = setInterval(() => {
      if (!alive()) { clearInterval(timerInterval); return; }
      timeLeft--;
      updateTimerEl();
      if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(); }
    }, 1000);
  }

  function fmtTime(s) {
    const m = Math.floor(s/60), sec = s%60;
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function updateTimerEl() {
    const el = document.getElementById('arith-timer');
    if (!el) return;
    el.textContent = fmtTime(timeLeft);
    el.className = 'arith-timer' + (timeLeft <= 60 ? ' warn' : '');
  }

  function updateStats() {
    const answered = answers.filter(a => a !== null).length;
    setStats(`<div class="stat-pill">Q <b>${currentIdx+1}</b>/${TOTAL_Q}</div><div class="stat-pill">${answered} answered</div>`);
  }

  // ── RENDER QUESTION ──
  function renderQ(idx) {
    currentIdx = idx;
    const q = questions[idx];
    const pct = (idx / TOTAL_Q * 100).toFixed(1);

    let bodyHTML = '';
    if (isMultipleChoice) {
      const choices = allChoices[idx];
      const answered = answers[idx];
      const choicesHTML = choices.map(c =>
        `<button class="arith-choice ${answered && c === answered.raw ? 'selected-mc' : ''}"
          onclick="arithPick('${c.replace(/'/g,"\\'")}', ${idx})">${c}</button>`
      ).join('');
      bodyHTML = `<div class="arith-choices">${choicesHTML}</div>`;
    } else {
      // Free response
      const prev = answers[idx] ? answers[idx].raw : '';
      bodyHTML = `
        <div class="arith-input-wrap">
          <input class="arith-input" id="arith-input" type="text"
            value="${prev.replace(/"/g,'&quot;')}"
            placeholder="Enter answer…"
            onkeydown="arithInputKey(event, ${idx})"
            autocomplete="off" spellcheck="false">
          <button class="arith-submit-btn" onclick="arithSubmitFR(${idx})">Enter</button>
        </div>`;
    }

    setPanel(`<div class="arith-wrap">
      <div class="arith-nav-bar">
        <span class="arith-q-counter">Q ${idx+1} / ${TOTAL_Q}</span>
        <span class="arith-timer" id="arith-timer">${fmtTime(timeLeft)}</span>
      </div>
      <div class="arith-prog-wrap">
        <div class="arith-prog-track"><div class="arith-prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="arith-question-label">What is</div>
      <div class="arith-question">${q.question}</div>
      ${bodyHTML}
    </div>`, true);

    updateTimerEl();
    updateStats();

    // Auto-focus the input for FR
    if (!isMultipleChoice) {
      const inp = document.getElementById('arith-input');
      if (inp) setTimeout(() => inp.focus(), 30);
    }
  }

  // ── MC PICK ──
  window.arithPick = (chosen, idx) => {
    if (!alive() || submitted) return;
    const parsed = parseInput(chosen);
    answers[idx] = { raw: chosen, parsed };
    // Auto-advance
    const next = idx + 1;
    if (next < TOTAL_Q) { renderQ(next); }
    else { submitTest(); }
  };

  // ── FR SUBMIT ──
  window.arithSubmitFR = (idx) => {
    if (!alive() || submitted) return;
    const inp = document.getElementById('arith-input');
    if (!inp) return;
    const raw = inp.value.trim();
    if (!raw) {
      // blank = skip (null stays)
      answers[idx] = null;
    } else {
      const parsed = parseInput(raw);
      answers[idx] = { raw, parsed };
    }
    const next = idx + 1;
    if (next < TOTAL_Q) { renderQ(next); }
    else { submitTest(); }
  };

  window.arithInputKey = (e, idx) => {
    if (e.key === 'Enter') { e.preventDefault(); window.arithSubmitFR(idx); }
  };

  // ── SUBMIT ──
  window.submitTest = function() {
    if (!alive()) return;
    submitted = true;
    clearInterval(timerInterval);

    let correct = 0, incorrect = 0, skipped = 0;
    answers.forEach((a, i) => {
      if (a === null) { skipped++; }
      else if (fracEqual(a.parsed, questions[i].answer)) { correct++; }
      else { incorrect++; }
    });
    const score = correct - incorrect - skipped;
    const scoreStr = score >= 0 ? `+${score}` : String(score);
    const prev = arithScores[gameId];
    const isNewBest = prev == null || score > prev.v;
    saveArithScore(gameId, score, scoreStr);
    renderDashboard();

    const bestLabel = getArithScoreLabel(gameId);
    setStats('');
    setPanel(`<div class="arith-wrap">
      <div class="arith-review-header">
        <div class="arith-score-big">${scoreStr}</div>
        <div class="arith-score-sub">Score = correct − incorrect − skipped</div>
        <div class="arith-score-pills">
          <span class="arith-score-pill green">✓ ${correct} correct</span>
          <span class="arith-score-pill red">✗ ${incorrect} incorrect</span>
          <span class="arith-score-pill red">⊘ ${skipped} skipped (−${skipped})</span>
          ${isNewBest ? '<span class="arith-score-pill best">★ New best!</span>'
            : bestLabel ? `<span class="arith-score-pill best">Best: ${bestLabel}</span>` : ''}
        </div>
      </div>
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);text-align:center;margin-bottom:10px">Review answers</div>
      <div id="review-body"></div>
    </div>`, true);

    renderReview(0);
  };

  // ── REVIEW ──
  function renderReview(idx) {
    reviewIdx = idx;
    const q = questions[idx];
    const userAns = answers[idx];
    const correctAns = q.answer;
    const correctDisplay = answerDisplay(correctAns);
    const isCorrect = userAns !== null && fracEqual(userAns.parsed, correctAns);
    const isSkipped = userAns === null;

    let answerHtml = '';
    if (isMultipleChoice) {
      const choices = allChoices[idx];
      answerHtml = `<div class="arith-choices" style="margin-bottom:12px">` +
        choices.map(c => {
          let cls = 'arith-choice';
          if (c === correctDisplay) cls += ' reveal-correct';
          else if (userAns && c === userAns.raw && !isCorrect) cls += ' wrong';
          return `<button class="${cls}" disabled>${c}</button>`;
        }).join('') + `</div>`;
    } else {
      // FR review
      let inputCls = 'arith-input';
      let inputVal = isSkipped ? '—' : userAns.raw;
      if (!isSkipped) inputCls += isCorrect ? ' correct' : ' wrong';
      answerHtml = `
        <input class="${inputCls}" value="${inputVal.replace(/"/g,'&quot;')}" disabled
          style="margin-bottom:8px;width:100%">
        ${!isCorrect ? `<div class="arith-correct-reveal">Correct answer: ${correctDisplay}</div>` : ''}
      `;
    }

    const statusLabel = isSkipped
      ? `<span style="color:var(--muted);font-size:.82rem">Skipped</span>`
      : isCorrect
        ? `<span style="color:var(--green);font-size:.82rem;font-weight:700">✓ Correct</span>`
        : `<span style="color:var(--red);font-size:.82rem;font-weight:700">✗ Incorrect</span>`;

    // Dot grid (10 per row for 80 questions)
    const dotHTML = answers.map((a, i) => {
      const ca = questions[i].answer;
      const isC = a !== null && fracEqual(a.parsed, ca);
      let cls = 'arith-q-dot';
      if (i === idx) cls += ' active';
      else if (a === null) cls += ' dot-skip';
      else if (isC) cls += ' dot-correct';
      else cls += ' dot-wrong';
      return `<button class="${cls}" onclick="arithReviewGoto(${i})" title="Q${i+1}">${i+1}</button>`;
    }).join('');

    document.getElementById('review-body').innerHTML = `
      <div class="arith-review-nav">
        <button class="arith-review-arrow" onclick="arithReviewGoto(${idx-1})" ${idx===0?'disabled':''}>&#8592;</button>
        <div class="arith-review-q-label">Q ${idx+1} / ${TOTAL_Q}</div>
        <button class="arith-review-arrow" onclick="arithReviewGoto(${idx+1})" ${idx===TOTAL_Q-1?'disabled':''}>&#8594;</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="arith-question-label" style="margin:0">What is</div>
        ${statusLabel}
      </div>
      <div class="arith-question" style="font-size:1.6rem;margin-bottom:16px">${q.question}</div>
      ${answerHtml}
      <div class="arith-feedback"><strong>Solution:</strong> ${q.explanation}</div>
      <div class="arith-q-grid" style="margin-top:16px">${dotHTML}</div>
    `;
  }

  window.arithReviewGoto = (idx) => {
    if (!alive() || idx < 0 || idx >= TOTAL_Q) return;
    renderReview(idx);
  };

  // ── START SCREEN ──
  const modeName = isMultipleChoice ? 'Multiple Choice' : 'Free Response';
  setPanel(`<div class="start-card">
    <h3>80 in 8 — ${modeName}</h3>
    <p>80 arithmetic questions &nbsp;·&nbsp; 8 minutes</p>
    <p style="font-size:.85rem;color:var(--text2);margin-top:8px">
      ${isMultipleChoice
        ? 'Select one of four answer choices per question. The next question appears immediately after your selection.'
        : 'Type your answer and press <strong>Enter</strong>. Fractions (1/2) and decimals (0.5) are both accepted. Leave blank and press Enter to skip.'}
    </p>
    <p style="font-size:.82rem;color:var(--text2);margin-top:6px"><strong>Score = correct − incorrect − skipped.</strong></p>
    <button class="big-btn" onclick="arithBegin()" style="margin-top:20px">Begin →</button>
  </div>`);

  window.arithBegin = () => {
    if (!alive()) return;
    startTimer();
    renderQ(0);
  };
}
